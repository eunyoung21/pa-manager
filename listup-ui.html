<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DUSK Listup — 인플루언서 발굴·관리</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { fontFamily: { sans: ['Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI','sans-serif'] } } }
  }
</script>
<style>
  body{background:#08080d}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#2a2a35;border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#3a3a48}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body class="text-zinc-200 font-sans">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

/* ─────────────────────────  상수  ───────────────────────── */
const BRANDS = ['체다 · 그래니샐러드', '베이스툰'];

const CATEGORIES = ['브랜드 기본','뷰티/스킨케어','패션/스타일','헬스/다이어트','건강/통증/영양','육아/키즈','헤어/탈모','구강/치아','라이프/웰니스','푸드'];

const TIERS = [
  {k:'메가',     d:'100만+'},
  {k:'하이',     d:'50~100만'},
  {k:'미들',     d:'10~50만'},
  {k:'로우',     d:'5~10만'},
  {k:'로우미들', d:'3~5만'},
  {k:'로우엔트리',d:'1~3만'},
  {k:'마이크로', d:'1만 이하'},
];

const STATUSES = ['신규','제안','컨택','계약','완료','블랙'];
const STATUS_STYLE = {
  '신규': 'bg-blue-500/15   text-blue-300   border-blue-500/40',
  '제안': 'bg-violet-500/15 text-violet-300 border-violet-500/40',
  '컨택': 'bg-yellow-500/15 text-yellow-300 border-yellow-500/40',
  '계약': 'bg-cyan-500/15   text-cyan-300   border-cyan-500/40',
  '완료': 'bg-green-500/15  text-green-300  border-green-500/40',
  '블랙': 'bg-red-500/15    text-red-300    border-red-500/40',
};
const STATUS_ACTIVE = {
  '신규': 'bg-blue-600   border-blue-400   text-white',
  '제안': 'bg-violet-600 border-violet-400 text-white',
  '컨택': 'bg-yellow-600 border-yellow-400 text-white',
  '계약': 'bg-cyan-600   border-cyan-400   text-white',
  '완료': 'bg-green-600  border-green-400  text-white',
  '블랙': 'bg-red-600    border-red-400    text-white',
};

const GENDERS = ['전체','여성','남성','기타'];
const SORTS = ['Quality Score','ER 높은순','3주 게시물','3주 좋아요','3주 댓글','팔로워 많은순','팔로워 적은순','최근 수집순','레더'];
const COUNTS = [100, 200, 500];

const AV = ['from-pink-500 to-rose-500','from-violet-500 to-indigo-500','from-cyan-500 to-blue-500','from-amber-500 to-orange-500','from-emerald-500 to-teal-500','from-fuchsia-500 to-purple-500','from-sky-500 to-cyan-500','from-rose-500 to-red-500'];
const TH = ['from-zinc-700 to-zinc-800','from-indigo-900 to-zinc-900','from-rose-900 to-zinc-900','from-emerald-900 to-zinc-900','from-amber-900 to-zinc-900','from-cyan-900 to-zinc-900'];

/* ─────────────────────────  유틸  ───────────────────────── */
const fmtK = n => n>=10000 ? (n%10000===0 ? (n/10000)+'만' : (n/10000).toFixed(1)+'만') : n.toLocaleString();
const fmtN = n => n>=10000 ? (n/10000).toFixed(1)+'만' : n.toLocaleString();
const tierOf = n => n>=1e6?'메가':n>=5e5?'하이':n>=1e5?'미들':n>=5e4?'로우':n>=3e4?'로우미들':n>=1e4?'로우엔트리':'마이크로';

/* ─────────────────────────  Mock 데이터  ───────────────────────── */
function buildMock(){
  const base = [
    ['skin_jenny','제니 · 피부과 간호사','민감성 피부 루틴 / 성분 분석 ✨','뷰티/스킨케어','여성','신규',98000, 9,189,1, 'S'],
    ['gym_taeho','태호 · 헬스 트레이너','3대 500 / 다이어트 식단 공유','헬스/다이어트','남성','제안',342000, 12,2400,84,'A'],
    ['mom_dada','다다맘 · 두아이 엄마','육아템 솔직리뷰 / 이유식','육아/키즈','여성','컨택',54000, 7,420,33,'A'],
    ['joint_doc','관절박사 · 정형외과','무릎·허리 통증 운동법','건강/통증/영양','남성','신규',127000, 5,310,12,'B'],
    ['salad_lab','샐러드연구소','일주일 샐러드 식단 / 저속노화','푸드','기타','계약',211000, 15,1800,57,'S'],
    ['hair_up','헤어업 · 탈모관리사','두피·탈모 케어 루틴','헤어/탈모','남성','제안',38000, 8,260,9, 'B'],
    ['teeth_smile','스마일덴트','치아미백 / 구강관리 꿀팁','구강/치아','여성','신규',16000, 6,140,2, 'B'],
    ['fit_sora','소라 · 필라테스','체형교정 / 코어운동','헬스/다이어트','여성','컨택',76000, 10,980,41,'A'],
    ['daily_woon','운이의 일상','미니멀 라이프 / 자취 브이로그','라이프/웰니스','남성','완료',29000, 9,510,18,'A'],
    ['beauty_haru','하루 · 메이크업','데일리 화장법 / 신상 리뷰','뷰티/스킨케어','여성','신규',460000, 14,5200,120,'S'],
    ['veg_mama','채소엄마','아이 채소 편식 극복 레시피','육아/키즈','여성','제안',41000, 11,330,22,'B'],
    ['run_kim','김런 · 러너','마라톤 / 러닝 페이스 기록','헬스/다이어트','남성','신규',23000, 13,410,15,'B'],
    ['glow_yu','유리 · 뷰티에디터','앰플·세럼 성분 비교 리뷰','뷰티/스킨케어','여성','계약',880000, 9,9800,210,'S'],
    ['care_mom','케어맘','시니어 부모님 건강 챙기기','건강/통증/영양','여성','컨택',62000, 7,470,28,'A'],
    ['style_jin','진 · 패션','캐주얼 코디 / 데일리룩','패션/스타일','남성','블랙',135000, 6,1100,9, 'C'],
    ['food_log','먹부림로그','맛집 / 홈쿡 / 밀키트 리뷰','푸드','기타','완료',58000, 16,720,35,'A'],
  ];
  return base.map((r,i)=>{
    const [username,name,bio,category,gender,status,followers,posts3w,avgLikes,avgComments,grade] = r;
    const er = +((avgLikes+avgComments)/followers*100).toFixed(2);
    const quality = Math.round((grade==='S'?92:grade==='A'?78:grade==='B'?63:45) + (er*2));
    const top = Array.from({length:4}).map((_,j)=>({
      views: Math.round(avgLikes*(6-j)*1.7 + 800),
      likes: Math.round(avgLikes*(1.4-j*0.18) + 30),
      th: TH[(i+j)%TH.length],
    }));
    return { id:i+1, username, name, bio, category, gender, status, followers, tier:tierOf(followers),
             posts3w, avgLikes, avgComments, er, quality, grade, collectedAt:base.length-i, av:AV[i%AV.length], top };
  });
}
const MOCK = buildMock();

/* ─────────────────────────  공통 UI  ───────────────────────── */
function Pill({active, onClick, children, activeClass='bg-zinc-700/50 border-zinc-300 text-white', title}){
  return (
    <button title={title} onClick={onClick}
      className={"px-3 py-1.5 rounded-lg text-xs font-medium border transition whitespace-nowrap "
        + (active ? activeClass : "border-zinc-700/80 text-zinc-400 hover:text-zinc-100 hover:border-zinc-500")}>
      {children}
    </button>
  );
}
function Field({label, children}){
  return (
    <div className="flex flex-col gap-1.5">
      <span className="text-[11px] font-semibold uppercase tracking-wide text-zinc-500">{label}</span>
      <div className="flex flex-wrap gap-1.5">{children}</div>
    </div>
  );
}

/* ─────────────────────────  필터 패널  ───────────────────────── */
function FilterBar(props){
  const { brand,setBrand, cat,setCat, tiers,toggleTier, statuses,toggleStatus,
          gender,setGender, exclBiz,setExclBiz, sort,setSort, count,setCount,
          q,setQ, total } = props;

  return (
    <div className="rounded-2xl bg-[#101017] border border-zinc-800 p-5 flex flex-col gap-5">

      {/* 1행: 브랜드 + 카테고리표시  /  상태 필터 */}
      <div className="flex flex-wrap items-start justify-between gap-4">
        <div className="flex flex-col gap-1.5">
          <span className="text-[11px] font-semibold uppercase tracking-wide text-zinc-500">브랜드</span>
          <select value={brand} onChange={e=>setBrand(e.target.value)}
            className="bg-[#0a0a10] border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 outline-none focus:border-violet-500 min-w-[200px]">
            {BRANDS.map(b=><option key={b}>{b}</option>)}
          </select>
          <span className="text-xs text-zinc-500">선택 카테고리 · <span className="text-violet-300 font-medium">{cat}</span></span>
        </div>

        <Field label="상태">
          {STATUSES.map(s=>(
            <Pill key={s} active={statuses.includes(s)} onClick={()=>toggleStatus(s)} activeClass={STATUS_ACTIVE[s]}>{s}</Pill>
          ))}
        </Field>
      </div>

      {/* 카테고리 태그 */}
      <Field label="카테고리">
        {CATEGORIES.map(c=>(
          <Pill key={c} active={cat===c} onClick={()=>setCat(c)} activeClass="bg-violet-600/20 border-violet-500 text-violet-200">{c}</Pill>
        ))}
      </Field>

      {/* 팔로워 Tier */}
      <Field label="팔로워 Tier">
        {TIERS.map(t=>(
          <Pill key={t.k} active={tiers.includes(t.k)} onClick={()=>toggleTier(t.k)}
            activeClass="bg-emerald-600/20 border-emerald-500 text-emerald-200" title={t.d}>
            {t.k} <span className="text-[10px] opacity-60">{t.d}</span>
          </Pill>
        ))}
      </Field>

      {/* 개수 / 성별 / 정렬 */}
      <div className="flex flex-wrap gap-6">
        <div className="flex flex-col gap-1.5">
          <span className="text-[11px] font-semibold uppercase tracking-wide text-zinc-500">개수</span>
          <select value={count} onChange={e=>setCount(+e.target.value)}
            className="bg-[#0a0a10] border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 outline-none focus:border-violet-500">
            {COUNTS.map(c=><option key={c} value={c}>{c}명</option>)}
          </select>
        </div>

        <Field label="성별">
          {GENDERS.map(g=>(
            <Pill key={g} active={gender===g} onClick={()=>setGender(g)} activeClass="bg-sky-600/20 border-sky-500 text-sky-200">{g}</Pill>
          ))}
          <Pill active={exclBiz} onClick={()=>setExclBiz(v=>!v)} activeClass="bg-zinc-200/90 border-zinc-200 text-zinc-900">
            업체 제외 {exclBiz?'ON':'OFF'}
          </Pill>
        </Field>
      </div>

      <Field label="정렬">
        {SORTS.map(s=>(
          <Pill key={s} active={sort===s} onClick={()=>setSort(s)} activeClass="bg-zinc-800 border-zinc-200 text-white shadow-[0_0_0_1px_rgba(255,255,255,.15)]">{s}</Pill>
        ))}
      </Field>

      {/* 검색 + 액션 */}
      <div className="flex flex-wrap items-center gap-2 pt-1">
        <div className="relative flex-1 min-w-[260px]">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500">🔍</span>
          <input value={q} onChange={e=>setQ(e.target.value)}
            placeholder="사용자명 / 이름 / 바이오 / 해시태그 검색"
            className="w-full bg-[#0a0a10] border border-zinc-700 rounded-lg pl-9 pr-3 py-2.5 text-sm text-zinc-100 outline-none focus:border-violet-500 placeholder:text-zinc-600"/>
        </div>
        <button className="px-4 py-2.5 rounded-lg text-sm font-semibold bg-violet-600 hover:bg-violet-500 text-white transition">필터 적용</button>
        <button className="px-4 py-2.5 rounded-lg text-sm font-medium border border-zinc-700 text-zinc-200 hover:border-zinc-500 transition">✨ 베이스툰 100명 추천</button>
        <button className="px-4 py-2.5 rounded-lg text-sm font-medium border border-zinc-700 text-zinc-200 hover:border-zinc-500 transition">⬇ CSV 다운로드</button>
        <span className="text-xs text-zinc-500 ml-auto">검색결과 <b className="text-zinc-200">{total}</b>명</span>
      </div>
    </div>
  );
}

/* ─────────────────────────  인플루언서 카드  ───────────────────────── */
function Stat({label, value}){
  return (
    <div className="text-center">
      <div className="text-[10px] text-zinc-500 mb-0.5">{label}</div>
      <div className="text-sm font-bold text-zinc-100">{value}</div>
    </div>
  );
}
function Card({inf}){
  const [sel,setSel] = useState(false);
  return (
    <div className={"rounded-2xl bg-[#13131a] border p-4 flex flex-col gap-3 transition "
      + (sel ? "border-violet-500 ring-1 ring-violet-500/40" : "border-zinc-800 hover:border-zinc-600")}>

      {/* 상단 */}
      <div className="flex items-start gap-3">
        <input type="checkbox" checked={sel} onChange={e=>setSel(e.target.checked)}
          className="mt-1 w-4 h-4 accent-violet-500 cursor-pointer"/>
        <div className={"w-11 h-11 rounded-full bg-gradient-to-br "+inf.av+" flex items-center justify-center text-sm font-bold text-white shrink-0"}>
          {inf.name.slice(0,1)}
        </div>
        <div className="min-w-0 flex-1">
          <div className="font-semibold text-sm text-zinc-100 truncate">@{inf.username}</div>
          <div className="text-[11px] text-zinc-400 line-clamp-2 leading-snug">{inf.bio}</div>
        </div>
        <div className="flex flex-col gap-1 shrink-0">
          <button className="px-2.5 py-1 rounded-md text-[11px] font-semibold bg-violet-600 hover:bg-violet-500 text-white transition">DM</button>
          <button className="px-2.5 py-1 rounded-md text-[11px] font-semibold border border-zinc-700 text-zinc-300 hover:border-zinc-500 transition">IG</button>
        </div>
      </div>

      {/* 뱃지 */}
      <div className="flex flex-wrap items-center gap-1.5">
        <span className="px-2 py-0.5 rounded-md text-[10px] font-medium bg-zinc-800 text-zinc-300 border border-zinc-700">{inf.tier}</span>
        <span className="px-2 py-0.5 rounded-md text-[10px] font-medium bg-zinc-800 text-zinc-300 border border-zinc-700">{fmtN(inf.followers)}</span>
        <span className="px-2 py-0.5 rounded-md text-[10px] font-bold bg-zinc-800 text-amber-300 border border-zinc-700">{inf.grade}등급</span>
        <span className={"px-2 py-0.5 rounded-md text-[10px] font-semibold border ml-auto "+STATUS_STYLE[inf.status]}>{inf.status}</span>
      </div>

      {/* KPI */}
      <div className="bg-black/50 rounded-xl p-3 grid grid-cols-4 gap-2">
        <Stat label="3주 게시물" value={inf.posts3w+'개'}/>
        <Stat label="평균 좋아요" value={fmtN(inf.avgLikes)}/>
        <Stat label="평균 댓글" value={inf.avgComments}/>
        <Stat label="ER" value={inf.er+'%'}/>
      </div>

      {/* TOP 게시물 */}
      <div>
        <div className="flex items-center justify-between mb-1.5">
          <span className="text-[11px] font-semibold text-zinc-400">TOP 게시물</span>
          <span className="text-[10px] text-zinc-600">Quality {inf.quality}</span>
        </div>
        <div className="grid grid-cols-4 gap-1.5">
          {inf.top.map((p,i)=>(
            <div key={i} className={"relative aspect-square rounded-lg bg-gradient-to-br "+p.th+" overflow-hidden"}>
              {i===0 && <span className="absolute top-1 left-1 px-1 py-0.5 rounded bg-violet-600 text-white text-[8px] font-bold">TOP</span>}
              <div className="absolute inset-x-0 bottom-0 px-1 py-0.5 bg-black/55 text-[8px] text-zinc-100 flex justify-between">
                <span>▶{fmtN(p.views)}</span><span>♥{fmtN(p.likes)}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────  앱  ───────────────────────── */
function App(){
  const [brand,setBrand]   = useState(BRANDS[0]);
  const [cat,setCat]       = useState('브랜드 기본');
  const [tiers,setTiers]   = useState([]);
  const [statuses,setStat] = useState([]);
  const [gender,setGender] = useState('전체');
  const [exclBiz,setExcl]  = useState(true);
  const [sort,setSort]     = useState('Quality Score');
  const [count,setCount]   = useState(100);
  const [q,setQ]           = useState('');

  const toggle = (arr,set,v)=> set(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);

  const list = useMemo(()=>{
    let r = MOCK.slice();
    if(cat!=='브랜드 기본') r = r.filter(x=>x.category===cat);
    if(tiers.length)    r = r.filter(x=>tiers.includes(x.tier));
    if(statuses.length) r = r.filter(x=>statuses.includes(x.status));
    if(gender!=='전체')  r = r.filter(x=>x.gender===gender);
    if(q.trim()){
      const k=q.trim().toLowerCase();
      r = r.filter(x=>(x.username+x.name+x.bio).toLowerCase().includes(k));
    }
    const by = {
      'Quality Score':(a,b)=>b.quality-a.quality, 'ER 높은순':(a,b)=>b.er-a.er,
      '3주 게시물':(a,b)=>b.posts3w-a.posts3w, '3주 좋아요':(a,b)=>b.avgLikes-a.avgLikes,
      '3주 댓글':(a,b)=>b.avgComments-a.avgComments, '팔로워 많은순':(a,b)=>b.followers-a.followers,
      '팔로워 적은순':(a,b)=>a.followers-b.followers, '최근 수집순':(a,b)=>b.collectedAt-a.collectedAt,
      '레더':(a,b)=>a.grade.localeCompare(b.grade),
    }[sort];
    if(by) r.sort(by);
    return r.slice(0,count);
  },[cat,tiers,statuses,gender,sort,count,q]);

  return (
    <div className="min-h-screen">
      {/* 헤더 */}
      <header className="sticky top-0 z-20 bg-[#08080d]/90 backdrop-blur border-b border-zinc-800 px-6 py-3 flex items-center gap-3">
        <div className="text-base font-bold">DUSK <span className="text-violet-400">Listup</span></div>
        <div className="text-xs text-zinc-500">인플루언서 발굴 · 추천 · 관리</div>
        <div className="ml-auto flex items-center gap-4 text-xs text-zinc-500">
          <span>총 수집 <b className="text-zinc-200">{MOCK.length}</b></span>
          <span>표시 <b className="text-zinc-200">{list.length}</b></span>
        </div>
      </header>

      <main className="max-w-[1500px] mx-auto px-6 py-5 flex flex-col gap-5">
        <FilterBar {...{brand,setBrand,cat,setCat,tiers,toggleTier:v=>toggle(tiers,setTiers,v),
          statuses,toggleStatus:v=>toggle(statuses,setStat,v),gender,setGender,
          exclBiz,setExclBiz:setExcl,sort,setSort,count,setCount,q,setQ,total:list.length}}/>

        {list.length===0
          ? <div className="text-center text-zinc-500 py-20 text-sm">조건에 맞는 인플루언서가 없어요. 필터를 조정해 보세요.</div>
          : <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
              {list.map(inf=><Card key={inf.id} inf={inf}/>)}
            </div>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
