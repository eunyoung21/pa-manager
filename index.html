/* ─── USER MANAGEMENT VIEW ─── */
function UserMgmtView() {
  const [users, setUsers] = useState(null);
  const [msg, setMsg]     = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [newUser, setNewUser] = useState({username:'', password:'', role:'staff', brand:'all', pa:''});
  const [pwModal, setPwModal] = useState(null); // {id, username}
  const [newPw, setNewPw]     = useState('');
  // 담당 브랜드 선택지 (전체 + 각 브랜드)
  const BRAND_OPTS = [{id:'all',name:'전체'}, ...DEFAULT_BRANDS.map(b=>({id:b.id,name:b.name}))];
  const brandLabel = id => (BRAND_OPTS.find(o=>o.id===id)||{}).name || '전체';
  // 담당자(PA) 선택지 — 정산 본인 조회 매핑용 ('' = 미지정)
  const PA_OPTS = ['', ...PA_LIST];
  const paLabel = pa => pa || '미지정';

  function load() {
    callApi('users')
      .then(j => setUsers(j && j.ok ? j.users : []))
      .catch(() => setUsers([]));
  }
  useEffect(load, []);

  async function addUser(e) {
    e.preventDefault();
    if (!newUser.username || !newUser.password) return;
    const d = await callApi('userCreate', newUser);
    if (!d || !d.ok) { setMsg('❌ ' + ((d&&d.error)||'오류')); return; }
    setMsg('✅ 계정이 추가됐습니다');
    setNewUser({username:'', password:'', role:'staff', brand:'all', pa:''});
    setShowAdd(false);
    load();
  }

  async function changeBrand(id, brand) {
    const d = await callApi('userBrand', { id, brand });
    if (!d || !d.ok) { setMsg('❌ ' + ((d&&d.error)||'오류')); return; }
    setMsg('✅ 담당 브랜드가 변경됐습니다 (해당 계정 재로그인 시 적용)');
    load();
  }

  async function changePa(id, pa) {
    const d = await callApi('userPa', { id, pa });
    if (!d || !d.ok) { setMsg('❌ ' + ((d&&d.error)||'오류')); return; }
    setMsg('✅ 담당자(PA)가 변경됐습니다 — 정산 본인 조회에 반영 (해당 계정 재로그인 시 적용)');
    load();
  }

  async function delUser(id, username) {
    if (!confirm(`"${username}" 계정을 삭제할까요?`)) return;
    const d = await callApi('userDelete', { id });
    if (!d || !d.ok) { setMsg('❌ ' + ((d&&d.error)||'오류')); return; }
    setMsg('🗑 계정 삭제됨');
    load();
  }

  async function changePw(e) {
    e.preventDefault();
    if (!newPw) return;
    const d = await callApi('userPassword', { id: pwModal.id, password: newPw });
    if (!d || !d.ok) { setMsg('❌ ' + ((d&&d.error)||'오류')); return; }
    setMsg(`✅ "${pwModal.username}" 비밀번호가 변경됐습니다`);
    setPwModal(null); setNewPw('');
  }

  const roleLabel = r => r==='manager'?'관리자':'스태프';
  const roleColor = r => r==='manager'?{background:'#f3e8ff',color:'#7c3aed'}:{background:'#dbeafe',color:'#1d4ed8'};

  return <div style={{flex:'1 1 0',overflowY:'auto',padding:20}}>
    <div style={{maxWidth:560}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <span style={{fontWeight:700,fontSize:14}}>계정 관리</span>
        <button className="btn btn-primary" style={{fontSize:11,marginLeft:'auto'}} onClick={()=>setShowAdd(v=>!v)}>
          {showAdd ? '취소' : '+ 계정 추가'}
        </button>
      </div>

      {msg && <div style={{marginBottom:12,fontSize:12,color:msg.startsWith('❌')?'var(--red)':'#15803d'}}>{msg}</div>}

      {showAdd && <form onSubmit={addUser} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:16,marginBottom:16}}>
        <div style={{fontWeight:600,fontSize:12,marginBottom:12}}>새 계정 추가</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div>
            <div className="login-lbl">아이디</div>
            <input className="modal-inp" value={newUser.username} onChange={e=>setNewUser(p=>({...p,username:e.target.value}))} placeholder="아이디" autoFocus />
          </div>
          <div>
            <div className="login-lbl">비밀번호</div>
            <input className="modal-inp" type="password" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))} placeholder="비밀번호" />
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div className="login-lbl">권한</div>
          <select className="modal-sel" value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))}>
            <option value="staff">스태프 — 리스트업·컨택·출고 수정 가능</option>
            <option value="manager">관리자 — 정산·개인정보·계정관리 포함 전체 기능</option>
          </select>
        </div>
        <div style={{marginBottom:12}}>
          <div className="login-lbl">담당 브랜드</div>
          <select className="modal-sel" value={newUser.brand} onChange={e=>setNewUser(p=>({...p,brand:e.target.value}))}>
            {BRAND_OPTS.map(o=><option key={o.id} value={o.id}>{o.id==='all'?'전체 (모든 브랜드)':o.name+'만'}</option>)}
          </select>
        </div>
        {newUser.role==='staff'&&<div style={{marginBottom:12}}>
          <div className="login-lbl">담당자(PA) — 정산에서 본인 실적 조회용</div>
          <select className="modal-sel" value={newUser.pa} onChange={e=>setNewUser(p=>({...p,pa:e.target.value}))}>
            {PA_OPTS.map(pa=><option key={pa||'none'} value={pa}>{paLabel(pa)}</option>)}
          </select>
        </div>}
        <div style={{display:'flex',justifyContent:'flex-end'}}>
          <button className="btn btn-primary" type="submit" style={{fontSize:12}}>추가</button>
        </div>
      </form>}

      {!users && <div style={{color:'var(--muted)',fontSize:12}}>불러오는 중…</div>}
      {users && <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {users.map(u => <div key={u.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13}}>{u.username}</div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>생성일: {new Date(u.createdAt).toLocaleDateString('ko-KR')} · 담당: {brandLabel(u.brand||'all')}{u.role!=='manager'&&` · 담당자(PA): ${paLabel(u.pa)}`}</div>
          </div>
          <span style={{...roleColor(u.role),padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700}}>{roleLabel(u.role)}</span>
          <select className="modal-sel" style={{width:'auto',fontSize:11,padding:'2px 6px'}} value={u.brand||'all'} onChange={e=>changeBrand(u.id, e.target.value)} title="담당 브랜드">
            {BRAND_OPTS.map(o=><option key={o.id} value={o.id}>{o.id==='all'?'전체':o.name}</option>)}
          </select>
          {u.role!=='manager'&&<select className="modal-sel" style={{width:'auto',fontSize:11,padding:'2px 6px'}} value={u.pa||''} onChange={e=>changePa(u.id, e.target.value)} title="담당자(PA) — 정산 본인 조회 매핑">
            {PA_OPTS.map(pa=><option key={pa||'none'} value={pa}>{pa||'PA 미지정'}</option>)}
          </select>}
          <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{setPwModal(u);setNewPw('');}}>🔑 비번 변경</button>
          <button className="btn btn-ghost" style={{fontSize:11,color:'var(--red)'}} onClick={()=>delUser(u.id, u.username)}>삭제</button>
        </div>)}
      </div>}
    </div>

    {/* 비밀번호 변경 모달 */}
    {pwModal && <div className="overlay" onClick={e=>e.target===e.currentTarget&&setPwModal(null)}>
      <div className="modal" style={{width:340}}>
        <div className="modal-title">🔑 비밀번호 변경 — {pwModal.username}</div>
        <form onSubmit={changePw}>
          <div className="login-lbl">새 비밀번호</div>
          <input className="modal-inp" type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="새 비밀번호 입력" autoFocus style={{marginBottom:16}} />
          <div className="modal-foot">
            <button type="button" className="btn btn-ghost" onClick={()=>setPwModal(null)}>취소</button>
            <button type="submit" className="btn btn-primary">변경</button>
          </div>
        </form>
      </div>
    </div>}
  </div>;
}

/* ─── LOGIN SCREEN ─── */
function LoginScreen({ onLogin }) {
  const [id, setId]   = useState('');
  const [pw, setPw]   = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!id || !pw) return;
    setBusy(true); setErr('');
    try {
      const d = await callApi('login', { username: id, password: pw });
      if (!d || !d.ok) { setErr((d&&d.error) || '로그인 실패'); setBusy(false); return; }
      setAuth(d);
      onLogin(d);
    } catch { setErr('서버에 연결할 수 없습니다.'); setBusy(false); }
  }

  return <div className="login-wrap">
    <div className="login-box">
      <div className="login-logo">PA<span>Manager</span>(ey)</div>
      <div className="login-sub">관리자가 제공한 계정으로 로그인하세요</div>
      <form onSubmit={submit}>
        <div className="login-lbl">아이디</div>
        <input className="login-inp" value={id} onChange={e=>setId(e.target.value)} placeholder="아이디" autoFocus autoComplete="username" />
        <div className="login-lbl">비밀번호</div>
        <input className="login-inp" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호" autoComplete="current-password" />
        <div className="login-err">{err}</div>
        <button className="login-btn" type="submit" disabled={busy}>{busy ? '로그인 중…' : '로그인'}</button>
      </form>
    </div>
  </div>;
}

function AccessLogView() {
  const [logs, setLogs] = useState(null);
  useEffect(()=>{
    callApi('logs')
      .then(j=>setLogs(j&&j.ok?j.logs:[]))
      .catch(()=>setLogs([]));
  }, []);

  function actionLabel(a) {
    if(a==='LOGIN_OK') return {label:'로그인', cls:'log-ok'};
    if(a==='LOGIN_FAIL') return {label:'로그인 실패', cls:'log-fail'};
    if(a==='LOGOUT') return {label:'로그아웃', cls:'log-out'};
    if(a==='DATA_GET') return {label:'데이터 조회', cls:''};
    if(a?.startsWith('USER_ADD')) return {label:`계정 추가 (${a.split(':')[1]||''})`, cls:'log-ok'};
    if(a?.startsWith('USER_DEL')) return {label:`계정 삭제 (${a.split(':')[1]||''})`, cls:'log-fail'};
    return {label:a, cls:''};
  }

  if(!logs) return <div style={{padding:20,color:'var(--muted)'}}>불러오는 중…</div>;
  return <div className="log-page">
    <div style={{marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
      <span style={{fontWeight:600,fontSize:13}}>접속 로그</span>
      <span style={{fontSize:11,color:'var(--muted)'}}>(최근 200건)</span>
      <button className="btn btn-ghost" style={{fontSize:11,marginLeft:'auto'}} onClick={()=>{
        callApi('logs').then(j=>setLogs(j&&j.ok?j.logs:[]));
      }}>새로고침</button>
    </div>
    {logs.length===0 && <div style={{color:'var(--muted)',fontSize:12}}>로그 없음</div>}
    {logs.length>0 && <table className="log-table">
      <thead><tr>
        <th>시각</th><th>IP</th><th>사용자</th><th>동작</th>
      </tr></thead>
      <tbody>
        {logs.map((l,i)=>{
          const {label,cls}=actionLabel(l.action);
          const t=new Date(l.t).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
          return <tr key={i}>
            <td style={{color:'var(--muted)'}}>{t}</td>
            <td style={{color:'var(--accent)'}}>{l.ip}</td>
            <td>{l.username}</td>
            <td className={cls}>{label}</td>
          </tr>;
        })}
      </tbody>
    </table>}
  </div>;
}

function App() {
  const [authInfo, setAuthInfo] = useState(()=>getAuth());

  function handleLogin(d) { setAuthInfo(d); }
  function handleLogout() {
    const a = getAuth();
    if(a?.token) callApi('logout').catch(()=>{});
    setAuth(null);
    setAuthInfo(null);
  }

  // 토큰 만료 시 자동 로그아웃
  useEffect(()=>{ _onAuthExpired = handleLogout; return ()=>{ _onAuthExpired=null; }; }, []);

  if (!authInfo) return <LoginScreen onLogin={handleLogin} />;

  return <AppMain authInfo={authInfo} onLogout={handleLogout} />;
}

function AppMain({ authInfo, onLogout }) {
  const saved=normalizeData(load())||{};
  // 담당 브랜드 ('all'=전체, 'basetune'/'granny'=해당 브랜드만)
  const userBrand = authInfo?.brand || 'all';
  const [brands,      setBrands]      = useState(saved.brands||DEFAULT_BRANDS);
  const [settlements, setSettlements] = useState(saved.settlements||{});
  const [paList,      setPaList]      = useState(saved.paList&&saved.paList.length?saved.paList:PA_LIST);
  PA_LIST = paList; // 모듈 변수 동기화 — 모든 담당자 선택·색상·매핑이 현재 목록을 사용
  const [bId,         setBId]         = useState(userBrand!=='all'?userBrand:'basetune');
  const [tab,         setTab]         = useState('dashboard');
  const [filter,      setFilter]      = useState('all');
  const [search,      setSearch]      = useState('');
  const [modal,       setModal]       = useState(null);
  const [sheetModal,  setSheetModal]  = useState(false);
  const [menuOpen,    setMenuOpen]    = useState(false); // ⚙️ 관리 드롭다운
  const [ctMenuOpen,  setCtMenuOpen]  = useState(false); // 계약서 양식 ▾ 메뉴
  const [ctGenOpen,   setCtGenOpen]   = useState(false); // 계약서 생성 모달
  const [moreOpen,    setMoreOpen]    = useState(false); // ⋯ 더보기 탭 드롭다운
  const [privacyPrefill, setPrivacyPrefill] = useState(null);
  const [privacyModalRow, setPrivacyModalRow] = useState(null); // 컨택현황 개인정보 제출 → 개인정보 모달 대상
  const [syncing,     setSyncing]     = useState(false);
  const [msg,         setMsg]         = useState('');
  const [saveState,   setSaveState]   = useState('idle'); // idle|saving|saved|error — 헤더 저장 표시기
  const saveTimerRef = useRef(null);   // 자동저장 디바운스 타이머
  const savedClearRef= useRef(null);   // '저장됨' 표시를 잠시 후 지우는 타이머
  const dirtyRef     = useRef(false);  // 서버에 아직 저장 안 된 로컬 변경 존재 여부 — 폴링이 덮어쓰지 못하게 가드
  const saveSeqRef   = useRef(0);      // 편집 시퀀스 — 저장 도중 새 편집이 끼면 옛 저장 성공으로 dirty를 끄지 않도록
  const saveErrRef   = useRef('');     // 마지막 저장 실패 사유(사용자에게 표시 — 원인 진단용)
  const retryRef     = useRef(0);      // 저장 실패 재시도 횟수(지수 백오프로 백엔드 과부하 방지)
  const blockedRef   = useRef(false);  // 안전장치 차단 상태 — 같은 데이터 재시도 무의미하므로 자동재시도 중단
  const undoRef      = useRef(null);   // Ctrl+Z 스냅샷
  const immediateRef = useRef(false);  // import 후 즉시 서버 저장 플래그
  const brandsRef    = useRef(brands); // doImport에서 최신 brands 참조용
  const settlementsRef = useRef(settlements); // 로드 전 편집 보존 시 최신 정산 참조용
  const paListRef    = useRef(paList);        // 로드 전 편집 보존 시 최신 PA목록 참조용
  const serverLoadedRef = useRef(false); // 서버 최초 로드 완료 전 자동저장 차단(낡은 localStorage가 서버를 덮어쓰는 것 방지)
  const mountedRef   = useRef(false);    // 자동저장 effect의 첫 마운트 실행 구분용
  const editedBeforeLoadRef = useRef(false); // 서버 로드 완료 전에 사용자가 실제 편집했는지(콜드스타트 중 입력 보존)
  useEffect(()=>{ brandsRef.current=brands; },[brands]);
  useEffect(()=>{ settlementsRef.current=settlements; },[settlements]);
  useEffect(()=>{ paListRef.current=paList; },[paList]);

  const brand=brands.find(b=>b.id===bId)||brands[0];

  // Ctrl+Z 되돌리기
  useEffect(()=>{
    function onKey(e){
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey&&undoRef.current){
        const snap=undoRef.current; undoRef.current=null;
        setBrands(snap.brands); setSettlements(snap.settlements);
        setMsg('↩️ 가져오기 전으로 되돌렸습니다');
        const s={brands:snap.brands,settlements:snap.settlements,paList};
        callApi('save',{data:s}).catch(()=>{});
        save(s);
      }
    }
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[]);

  // Server sync + auto-import on first load
  useEffect(()=>{
    loadFromServer().then(async d=>{
      let currentBrands = brands;
      // 콜드스타트 대기 중 사용자가 이미 편집했으면: 원래는 로컬을 무조건 보존·저장했는데,
      // 로드가 느린(3MB) 동안 클릭만 해도 이 분기가 켜져 '낡은 로컬'이 서버를 덮어 최근 데이터가
      // 사라지는 사고가 났음. → ★ 로컬이 서버보다 행수가 적으면(=낡음) 무조건 서버를 택한다.
      if(editedBeforeLoadRef.current){
        serverLoadedRef.current=true;
        const cntRows=bs=>(bs||[]).reduce((n,b)=>n+['step1Rows','step2Rows','claudeStep1Rows','claudeStep2Rows','shippingRows','reviewRows','privacyRows'].reduce((m,k)=>m+((b[k]||[]).length),0),0);
        const localN=cntRows(brandsRef.current), serverN=d?.brands?cntRows(d.brands):0;
        if(d?.brands?.length && serverN>localN){
          // 로컬이 서버보다 적음 = 낡은 로컬 → 서버 데이터 적용(편집 한두 개는 양보, 전체 데이터 보호 우선)
          const valid=d.brands.every(b=>Array.isArray(b.step1Rows));
          if(valid){ setBrands(d.brands); if(d.settlements)setSettlements(d.settlements); if(d.paList&&d.paList.length)setPaList(d.paList); }
          dirtyRef.current=false;
          setMsg('🔄 최신 데이터로 동기화했어요');
          return;
        }
        // 로컬이 서버 이상(내 편집이 반영된 최신본) → 내 편집 보존하고 저장
        dirtyRef.current=true;
        const s={brands:brandsRef.current,settlements:settlementsRef.current,paList:paListRef.current};
        save(s);
        postData(s,++saveSeqRef.current);
        return; // 첫 실행 자동 import 등은 건너뜀(이미 편집 상태이므로)
      }
      if(d?.brands?.length){
        const valid=d.brands.every(b=>Array.isArray(b.step1Rows));
        if(valid){
          setBrands(d.brands); currentBrands=d.brands;
          // 옛 상태값(컨택 중→진행중, 불발→거절, 옛 PA이름)이 정규화로 바뀌었으면 서버에 1회 영구 저장
          if(d._hadLegacy){
            const s={brands:d.brands,settlements:d.settlements||{},paList:d.paList};
            callApi('save',{data:s}).catch(()=>{});
            save(s);
          }
        }
      }
      if(d?.settlements)setSettlements(d.settlements);
      if(d?.paList&&d.paList.length)setPaList(d.paList);
      serverLoadedRef.current=true; // 서버 로드 완료 → 이제부터 사용자 변경만 자동저장

      // 첫 실행 시 (모든 브랜드에 데이터가 없으면) 자동으로 시트에서 가져오기
      const isEmpty = currentBrands.every(b=>
        (!b.step1Rows||b.step1Rows.length===0) &&
        (!b.step2Rows||b.step2Rows.length===0) &&
        (!b.shippingRows||b.shippingRows.length===0)
      );
      if(isEmpty) {
        setMsg('📥 첫 실행: 시트에서 데이터 불러오는 중…');
        setSyncing(true);
        try {
          const results = await Promise.all(
            DEFAULT_BRANDS.map(b => doImport(b.id))
          );
          const total = results.reduce((s,n)=>s+n,0);
          setMsg(total>0?`✅ ${total}개 항목 가져옴`:'✅ 시트에 데이터 없음');
        } catch(e) {
          setMsg('❌ 시트 가져오기 실패: start.bat이 실행 중인지 확인하세요');
        } finally { setSyncing(false); }
      }
    });
    // 서버 데이터 폴링 — 2분 간격, 탭이 보일 때만(트래픽 절약). rev가 안 바뀌면 전체 조회 생략.
    const iv=setInterval(async ()=>{
      if(document.visibilityState!=='visible')return;
      if(dirtyRef.current)return; // 미저장 로컬 변경이 있으면 폴링이 덮어쓰지 않음(입력 중 내용 사라짐 방지)
      try{ const rj=await callApi('rev'); if(!rj||rj.rev==null||rj.rev===_lastRev)return; }catch{ return; } // 변경 없음
      loadFromServer().then(d=>{
        if(dirtyRef.current)return; // 비동기 응답 도착 사이 새 편집이 생겼으면 적용 안 함
        if(d?.brands?.length&&JSON.stringify(d.brands)!==JSON.stringify(brandsRef.current)){
          // ★ 데이터 유실 방지: 서버가 갑자기 훨씬 적은 데이터를 주면(일시 장애 폴백 등)
          //    화면을 덮어쓰지 않는다. 줄어든 데이터로 화면이 바뀌면 입력이 사라지고 저장도 꼬임.
          const cnt=bs=>(bs||[]).reduce((n,b)=>n+['step1Rows','step2Rows','claudeStep1Rows','claudeStep2Rows','shippingRows','reviewRows','privacyRows'].reduce((m,k)=>m+((b[k]||[]).length),0),0);
          const cur=cnt(brandsRef.current), inc=cnt(d.brands);
          if(cur>=20 && inc < cur*0.7) console.warn('[poll] 서버 데이터 급감 무시',cur,'→',inc);
          else setBrands(d.brands);
        }
        if(d?.settlements)setSettlements(d.settlements);
      });
    },120000);
    return()=>clearInterval(iv);
  },[]);

  // 시트 가져오기는 사용자가 '동기화' 버튼을 누를 때만 실행 (자동 동기화 없음)

  // 서버 저장 1회 — 상태 표시기(저장 중/저장됨/실패)를 함께 갱신. 실패 시 '재시도'에서도 재사용.
  const postData = React.useCallback((s,seq)=>{
    setSaveState('saving');
    blockedRef.current=false;
    return callApi('save',{data:s})
      .then(j=>{
        console.log('[save] 응답', j);
        // 서버 안전장치(급감 차단): 이 화면 데이터가 서버보다 크게 적을 때. 자동 새로고침하면
        // 오히려 편집분이 날아갈 수 있어 새로고침하지 않고, 원인(행수)을 명확히 보여준다.
        if(j && j.blocked){
          saveErrRef.current='안전장치 차단: 서버 '+(j.prevCount)+'행 vs 이 화면 '+(j.newCount)+'행';
          blockedRef.current=true;
          setSaveState('error');
          setMsg('🛡️ 저장 차단(안전장치): 이 화면('+j.newCount+'행)이 서버('+j.prevCount+'행)보다 크게 적어 데이터를 지키려 저장을 막았어요. 데이터는 그대로 있어요 — 새로고침(F5) 후 다시 시도하세요.');
          return; // 재시도·리로드 안 함(데이터 보존). 사용자가 판단해 새로고침
        }
        if(!j || !j.ok){ saveErrRef.current=(j&&j.error)||'알 수 없는 오류'; throw new Error(saveErrRef.current); }
        if(j.rev!=null) _lastRev=j.rev; // 내 저장으로 rev 동기화 → 폴링이 불필요한 재조회 안 함
        // 저장한 뒤로 새 편집이 없었으면 dirty 해제 → 그때부터 폴링이 다시 최신 서버값을 반영 가능
        if(seq===saveSeqRef.current) dirtyRef.current=false;
        saveErrRef.current=''; retryRef.current=0;
        setSaveState('saved');
        clearTimeout(savedClearRef.current);
        savedClearRef.current=setTimeout(()=>setSaveState('idle'),2000);
      })
      .catch(e=>{ saveErrRef.current=String(e&&e.message||e); console.error('[save] 실패', e); setMsg('❌ 저장 실패: '+saveErrRef.current); setSaveState('error'); }); // 실패 사유를 화면에 표시(dirty 유지 → 데이터 보존)
  },[]);

  // 저장 실패 자동 재시도 — 지수 백오프(5→10→20→40→최대 60초). 성공할 때까지 반복하되
  // 실패가 계속돼도 백엔드를 과하게 때리지 않아(구글 앱스스크립트 일일 할당량 보호) 회복 여지를 줌.
  // 로컬(localStorage)엔 매 편집마다 저장돼 있어 재시도 중에도 데이터는 안전.
  useEffect(()=>{
    if(saveState!=='error'||blockedRef.current) return; // 안전장치 차단은 자동재시도 안 함(F5 후 재시도)
    const n=retryRef.current++;
    const delay=Math.min(60000, 5000*Math.pow(2,Math.min(n,4)));
    const t=setTimeout(()=>{
      postData({brands:brandsRef.current,settlements:settlementsRef.current,paList:paListRef.current},++saveSeqRef.current);
    },delay);
    return ()=>clearTimeout(t);
  },[saveState,postData]);

  // 모바일 저장 유실 방지 — 탭을 닫거나 다른 앱으로 전환하는 순간(숨김),
  // 대기 중인 디바운스 저장을 즉시 강제 전송한다. (모바일은 백그라운드 전환 시
  // setTimeout이 죽어 700ms 디바운스 POST가 영영 안 나가던 문제를 막음)
  useEffect(()=>{
    const flush=()=>{
      if(!serverLoadedRef.current||!dirtyRef.current)return; // 저장할 변경 없음
      clearTimeout(saveTimerRef.current);                    // 대기 중 디바운스 취소
      const s={brands:brandsRef.current,settlements:settlementsRef.current,paList:paListRef.current};
      save(s);                                               // 로컬 백업 확정
      postData(s,++saveSeqRef.current);                      // 즉시 서버 전송(숨김 직전이라 보통 완료됨)
    };
    const onVis=()=>{ if(document.visibilityState==='hidden')flush(); };
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('pagehide',flush);
    return()=>{ document.removeEventListener('visibilitychange',onVis); window.removeEventListener('pagehide',flush); };
  },[postData]);

  useEffect(()=>{
    const s={brands,settlements,paList};
    save(s);

  // 구글 시트 URL → {sheetId, gid} 추출
  function parseSheetUrl(url) {
    if (!url) return null;
    const idM = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    if (!idM) return null;
    const sheetId = idM[1];
    const gidM = url.match(/[?&#]gid=(\d+)/);
    const gid = gidM ? gidM[1] : '0';
    return { sheetId, gid };

  const SHEET_GIDS_DEFAULT = {

  function sheetLinkToCsvUrl(link) {
    if (!link) return null;
    try {
      const idMatch = link.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
      if (!idMatch) return link;
      const sheetId = idMatch[1];
      const gidMatch = link.match(/[#&?]gid=(\d+)/);
      const gid = gidMatch ? gidMatch[1] : '0';
      return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
    } catch { return link; }
  }

  function getSheetUrls(brand) {

    const SHEET_ID_DEFAULT = '1hJe8pxXne_zw8bUqo33z0XYBXfRwIk7Gu-hzA8-qIa8';
    function urlFromLink(link, defGid) {
      if (link) return sheetLinkToCsvUrl(link);
      if (defGid) return makeSheetCsvUrl(SHEET_ID_DEFAULT, defGid);
      return null;
    }
    return {
      step1: urlFromLink(links.step1, def.step1),
      step2: urlFromLink(links.step2, def.step2),
      ship:  urlFromLink(links.ship,  def.ship),
    };

    // 날짜는 시트 값을 그대로 사용 (CSV는 날짜를 문자열로 주므로 시차 보정 불필요)
    const fixDate = (d) => d;
    let added = 0;
    updateBrand(id, b=>{
      let nb={...b};

      // ── STEP1 전체 동기화 ─────────────────────────────────────
      if(t1){
        const{rows,headers}=parseCSV(t1);
        const nH=hFind(headers,'채널명'),lH=hFind(headers,'채널 링크')||hFind(headers,'링크'),fH=hFind(headers,'팔로워');
        const pH=hFind(headers,'페르소나'),feedH=hFind(headers,'피드'),hyH=hFind(headers,'가설');
        const paH=hFind(headers,'PA')||hFind(headers,'담당'),revH=hFind(headers,'검수'),dateH=findDateCol(headers,rows);

        // 시트 행을 기준으로 전체 재구성 (시트 순서 유지)
        // 헤더가 여러 줄인 시트 대응: 날짜 컬럼이 있는데 값이 날짜 형식이 아니면 헤더 연속 행으로 간주해 제거
        const isRealDataRow = r => {
          const name = rVal(r,nH).trim();
          if (!name || !normName(name)) return false;
          if (dateH) {
            const dv = rVal(r,dateH).trim();
            if (dv && !parseDateKey(dv)) return false; // 날짜 형식 아닌 값 → 헤더 연속 행
          }
          return true;
        };
        const sheetRows = rows.filter(isRealDataRow).map(r=>{
          // 검수상태: 시트값 그대로. 빈칸·'검수대기'는 reviewStatus()가 '검수대기'로 변환
          const rs=reviewStatus(rVal(r,revH));
          const pa=sanitizePA(rVal(r,paH));
          const name=rVal(r,nH), link=rVal(r,lH);
          // 기존 행이 있으면 id/promotedToStep2/rejectReason 유지, 나머지는 시트값으로 덮어씀
          const exist=(b.step1Rows||[]).find(e=>normName(e.name)===normName(name)||(link&&normLink(e.link)===normLink(link)));
          const sheetDate=fixDate(normDate(rVal(r,dateH)));
          if(exist){
            return{...exist,
              date:sheetDate||exist.date,
              name,link,followers:rVal(r,fH)||exist.followers,
              persona:rVal(r,pH)||exist.persona,
              feedMemo:rVal(r,feedH)||exist.feedMemo,
              hypothesis:rVal(r,hyH)||exist.hypothesis,
              pa:pa||exist.pa,
              // 동기화는 사용자가 직접 누를 때만 실행되므로 검수상태도 시트값으로 덮어씀(자동 동기화는 없음)
              reviewStatus:rs,
            };
          }
          // 새 행: 시트의 검수상태로 시작 (빈칸·검수대기 → 검수대기)
          added++;
          return{id:makeId(),date:sheetDate,name,link,followers:rVal(r,fH),
            persona:rVal(r,pH),feedMemo:rVal(r,feedH),hypothesis:rVal(r,hyH),
            pa,reviewStatus:rs,rejectReason:'',promotedToStep2:rs==='승인'};
        });

        // 시트가 정답: 시트에 없는 기존 행은 삭제하고 시트 기준으로 완전 교체
        nb.step1Rows=sheetRows;
      }

      // ── STEP2 전체 동기화 ─────────────────────────────────────
      if(t2){
        const{rows,headers}=parseCSV(t2);
        const nH=hFind(headers,'채널명'),lH=hFind(headers,'채널 링크')||hFind(headers,'링크'),fH=hFind(headers,'팔로워');
        const paH=hFind(headers,'PA')||hFind(headers,'담당'),stH=hFind(headers,'진행 상태')||hFind(headers,'상태');
        const dmH=hFind(headers,'DM'),dealH=hFind(headers,'협업 성사')||hFind(headers,'성사');
        const dealDtH=hFind(headers,'성사일');
        const rateH=hFind(headers,'단가'),sdH=hFind(headers,'제품 발송')||hFind(headers,'발송일');
        const epH=hFind(headers,'예상 게시'),shH=hFind(headers,'출고'),ctH=hFind(headers,'계약서');
        const mH=hFind(headers,'메모'),dateH=findDateCol(headers,rows);

        const sheetRows=rows.filter(r=>normName(rVal(r,nH))).map(r=>{
          const name=rVal(r,nH),link=rVal(r,lH);
          const dm=rVal(r,dmH)==='Y'?'Y':'N',deal=rVal(r,dealH)==='Y'?'Y':'N';
          const pa=sanitizePA(rVal(r,paH));
          // 날짜·담당PA: 시트→step1→기존 순으로 참조 (시트 PA칸이 비면 step1 담당자로 보완)
          const s1Match=(nb.step1Rows||[]).find(e=>normName(e.name)===normName(name));
          const s1Pa=sanitizePA(s1Match?.pa);
          const sheetDate=normDate(rVal(r,dateH));
          const s1Date=s1Match?.date;
          const exist=(b.step2Rows||[]).find(e=>normName(e.name)===normName(name)||(link&&normLink(e.link)===normLink(link)));
          const date=sheetDate||s1Date||(exist?.date)||'';
          // 성사일: 시트값 → 기존값 유지 → (성사 Y인데 비어있으면) 오늘 보정
          const sheetDealDt=normDate(rVal(r,dealDtH));
          if(exist){
            const dealDate=sheetDealDt||exist.dealDate||(deal==='Y'?today():'');
            return{...exist,date,name,link,followers:rVal(r,fH)||exist.followers,
              pa:pa||exist.pa||s1Pa,
              contactStatus:normStatus(rVal(r,stH)||exist.contactStatus||'컨택 전'),
              dmSent:dm,dealDone:deal,dealDate,
              rate:rVal(r,rateH)||exist.rate,
              shipDate:normDate(rVal(r,sdH))||exist.shipDate,
              expectedPost:normDate(rVal(r,epH))||exist.expectedPost,
              shippingDone:rVal(r,shH)||exist.shippingDone||'미완료',
              contractDone:rVal(r,ctH)||exist.contractDone||'미완료',
              memo:rVal(r,mH)||exist.memo,
            };
          }
          added++;
          return{id:makeId(),step1Id:null,date,name,link,followers:rVal(r,fH),
            pa:pa||s1Pa,contactStatus:normStatus(rVal(r,stH)||'컨택 전'),
            dmSent:dm,dealDone:deal,dealDate:sheetDealDt||(deal==='Y'?today():''),rate:rVal(r,rateH),
            shipDate:normDate(rVal(r,sdH)),expectedPost:normDate(rVal(r,epH)),
            shippingDone:rVal(r,shH)||'미완료',contractDone:rVal(r,ctH)||'미완료',contractUrl:'',memo:rVal(r,mH)};
        });

        // 시트가 정답: 시트에 없는 기존 행은 삭제하고 시트 기준으로 완전 교체
        // (업로드한 계약서 파일 contractUrl은 매칭된 행에서 유지됨 — 위 {...exist})
        nb.step2Rows=sheetRows;
      }

      // ── 출고 동기화 (시트 기준 완전 교체) ─────────────────────
      if(ts){
        const{rows,headers}=parseCSV(ts);
        const dH=hFind(headers,'출고요청일')||hFind(headers,'요청일'),rqH=hFind(headers,'요청자'),rsH=hFind(headers,'사유');
        const rcH=hFind(headers,'수령자'),phH=hFind(headers,'연락처'),adH=hFind(headers,'배송지')||hFind(headers,'주소');
        const prH=hFind(headers,'상품'),ntH=hFind(headers,'비고'),stH=hFind(headers,'처리 상태')||hFind(headers,'상태'),tkH=hFind(headers,'송장');
        const sdH=hFind(headers,'출고일자')||hFind(headers,'출고일');
        const existByKey=new Map((b.shippingRows||[]).map(r=>[`${normName(r.requestDate)}_${normName(r.recipient)}`,r]));
        const sheetRows=rows.filter(r=>{
          const k=`${normName(rVal(r,dH))}_${normName(rVal(r,rcH))}`;
          return k!=='_'&&Object.entries(r).some(([k,v])=>k!=='__idx'&&v&&String(v).trim());
        }).map(r=>{
          const reqDate=rVal(r,dH),recip=rVal(r,rcH);
          const exist=existByKey.get(`${normName(reqDate)}_${normName(recip)}`); // 매칭되면 id 유지
          return{id:exist?.id||makeId(),requestDate:reqDate,shipDate:rVal(r,sdH)||exist?.shipDate||'',requester:rVal(r,rqH),reason:rVal(r,rsH),
            recipient:recip,phone:rVal(r,phH),address:rVal(r,adH),
            product:rVal(r,prH),notes:rVal(r,ntH),status:rVal(r,stH)||'처리중',tracking:rVal(r,tkH)};
        });
        // 시트가 정답: 시트에 없는 기존 출고 행은 삭제
        nb.shippingRows=sheetRows;
      }

      // id 중복 방지 (매칭 충돌 등으로 같은 id가 생기는 것 차단)
      nb.step1Rows=dedupeIds(nb.step1Rows);
      nb.step2Rows=dedupeIds(nb.step2Rows);
      nb.shippingRows=dedupeIds(nb.shippingRows);
      return nb;
    });
    return added;
  }

  // 기존 데이터 중복 제거
  function deduplicateData(){
    setBrands(prev=>{
      const next=prev.map(b=>{
        const seen1=new Set(), seen2=new Set(), seenS=new Set();
        return{...b,
          step1Rows:(b.step1Rows||[]).filter(r=>{const k=normName(r.name);if(!k||seen1.has(k))return false;seen1.add(k);return true;})
            .map(r=>({...r,date:normDate(r.date),pa:sanitizePA(r.pa)})),
          step2Rows:(b.step2Rows||[]).filter(r=>{const k=normName(r.name);if(!k||seen2.has(k))return false;seen2.add(k);return true;})
            .map(r=>({...r,date:normDate(r.date),shipDate:normDate(r.shipDate),expectedPost:normDate(r.expectedPost),pa:sanitizePA(r.pa)})),
          shippingRows:(b.shippingRows||[]).filter(r=>{const k=`${normName(r.requestDate)}_${normName(r.recipient)}`;if(k==='_'||seenS.has(k))return false;seenS.add(k);return true;})
            .map(r=>({...r,requestDate:normDate(r.requestDate)})),
        };
      });
      const s={brands:next,settlements,paList};
      callApi('save',{data:s}).catch(()=>{});
      save(s);
      return next;
    });
    setMsg('🧹 중복 데이터 정리 완료');
  }

  async function importFromSheet(){
    // 실행 전 스냅샷 저장 (Ctrl+Z 용)
    undoRef.current={brands:JSON.parse(JSON.stringify(brands)),settlements:JSON.parse(JSON.stringify(settlements))};
    setSyncing(true); setMsg('');
    try{
      // 브랜드별 순차 동기화 (동시 실행 시 state 충돌 방지)
      const msgs=[];
      for(const b of brands){
        setMsg(`📥 ${b.name} 동기화 중…`);
        const added = await doImport(b.id);
        msgs.push(`${b.name}: ${added>0?`+${added}건`:'최신'}`);
        immediateRef.current=true;
      }
      setMsg(`✅ ${msgs.join(' / ')}`);
    }catch(e){
      setMsg(`❌ ${e.message}`);
    }finally{
      setSyncing(false);
      immediateRef.current=true;
    }
  }

  // ── 브랜드별 계약서 양식 업로드 ──────────────────────────────
  const contractTplRef = useRef(null);
  async function uploadContractTemplate(e) {
    const file = e.target.files?.[0]; if(!file) return;
    e.target.value='';
    // Render 디스크는 휘발성 → 파일을 데이터(Supabase)에 base64로 저장해 영구 보존
    if(file.size > 2*1024*1024){ setMsg('❌ 파일이 너무 큽니다 (2MB 이하로 올려주세요)'); return; }
    setMsg('📄 계약서 양식 저장 중…');
    const reader=new FileReader();
    reader.onload=ev=>{
      updateBrand(bId, b=>({...b, contractTemplate:{name:file.name,url:ev.target.result,type:file.type}}));
      immediateRef.current=true;
      setMsg(`✅ 계약서 양식 저장됨 (${file.name})`);
    };
    reader.onerror=()=>setMsg('❌ 파일 읽기 실패');
    reader.readAsDataURL(file);
  }
  function removeContractTemplate(){
    if(!confirm('이 브랜드의 계약서 양식을 삭제할까요?')) return;
    updateBrand(bId, b=>({...b, contractTemplate:null}));
    immediateRef.current=true;
    setMsg('🗑 계약서 양식 삭제됨');
  }

  const csvFileRef = useRef(null);
  function importFromCSV(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = '';
    const isExcel = /\.(xlsx|xls)$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        let rows, headers;
        if (isExcel) {
          const wb = XLSX.read(ev.target.result, {type:'array'});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const csv = XLSX.utils.sheet_to_csv(ws);
          ({rows, headers} = parseCSV(csv));
        } else {
          ({rows, headers} = parseCSV(ev.target.result));
        }
        if (!rows.length) { setMsg('❌ CSV 데이터 없음'); return; }
        undoRef.current={brands:JSON.parse(JSON.stringify(brands)),settlements:JSON.parse(JSON.stringify(settlements))};
        const nH=hFind(headers,'채널명'), lH=hFind(headers,'채널 링크')||hFind(headers,'링크'), fH=hFind(headers,'팔로워');
        const pH=hFind(headers,'페르소나'), feedH=hFind(headers,'피드'), hyH=hFind(headers,'가설');
        const paH=hFind(headers,'PA')||hFind(headers,'담당'), revH=hFind(headers,'검수');
        const dateH=findDateCol(headers,rows);
        let added=0;
        updateBrand(bId, b=>{
          const sheetRows=rows.filter(r=>normName(rVal(r,nH))).map(r=>{
            // 검수상태: 시트값 그대로 (빈칸·'검수대기' → '검수대기')
            const rs=reviewStatus(rVal(r,revH));
            const name=rVal(r,nH), link=rVal(r,lH);
            const exist=(b.step1Rows||[]).find(e=>normName(e.name)===normName(name)||(link&&normLink(e.link)===normLink(link)));
            if(exist) return{...exist,date:normDate(rVal(r,dateH))||exist.date,name,link,followers:rVal(r,fH)||exist.followers,reviewStatus:rs};
            added++;
            return{id:makeId(),date:normDate(rVal(r,dateH)),name,link,followers:rVal(r,fH),
              persona:rVal(r,pH),feedMemo:rVal(r,feedH),hypothesis:rVal(r,hyH),
              pa:sanitizePA(rVal(r,paH)),reviewStatus:rs,rejectReason:'',promotedToStep2:rs==='승인'};
          });
          const sheetNames=new Set(sheetRows.map(r=>normName(r.name)));
          const appOnly=(b.step1Rows||[]).filter(r=>!sheetNames.has(normName(r.name)));
          return{...b,step1Rows:dedupeIds([...sheetRows,...appOnly])};
        });
        immediateRef.current=true;
        setMsg(`✅ CSV 가져오기 완료 (신규 ${added}개)`);
      } catch(err) { setMsg(`❌ ${err.message}`); }
    };
    if (isExcel) reader.readAsArrayBuffer(file);
    else reader.readAsText(file, 'UTF-8');
  }

  const isStaff = authInfo?.role !== 'manager';
  const isManager = authInfo?.role === 'manager';
  // 모듈 IS_STAFF를 '로그인 역할' 기준으로 고정 — 스태프 계정은 항상 제한 UI(검수상태 수정 불가 등).
  // 관리자만 URL ?mode=staff 로 스태프 화면 미리보기 가능.
  IS_STAFF = isStaff || new URLSearchParams(window.location.search).get('mode')==='staff';
  // 담당 브랜드만 노출 ('all'이면 전체)
  const allowedBrands = userBrand==='all' ? brands : brands.filter(b=>b.id===userBrand);
  // 현재 선택된 브랜드가 허용 범위를 벗어나면 담당 브랜드로 고정
  useEffect(()=>{
    if(allowedBrands.length && !allowedBrands.some(b=>b.id===bId)) setBId(allowedBrands[0].id);
  },[userBrand,brands.length]);
  const visibleTabs=[
    ...TABS.filter(t=>(!t.mgr||isManager||t.staffOwn)&&(!t.guide||true)),
    ...(isManager ? [{key:'users', label:'👤 계정관리', mgr:true}, {key:'log', label:'🔐 접속로그', mgr:true}] : [])
  ];
  // 자주 쓰는 핵심 탭만 노출, 나머지(Claude·DM·가이드·계정·로그)는 '⋯ 더보기'로 접어 어지러움 감소.
  const PRIMARY_TABS=new Set(['dashboard','step1','step2','shipping','review','dm','settle','claudeS2','guide']);
  const primaryTabs=visibleTabs.filter(t=>PRIMARY_TABS.has(t.key));
  const moreTabs=visibleTabs.filter(t=>!PRIMARY_TABS.has(t.key));
  const activeMore=moreTabs.find(t=>t.key===tab);

  return <>
    <div className={`mode-banner ${isStaff?'staff':'manager'}`}>
      {isStaff?`👷 프리랜서 모드 (${authInfo?.username}) — 리스트업·컨택현황·출고 수정 + 내 정산 조회`:`🔑 관리자 모드 (${authInfo?.username}) — 정산 포함 전체 기능`}
    </div>

    <div className="header">
      <span className="logo">PA<span>Manager</span>(ey)</span>
      <div className="brand-tabs">
        {allowedBrands.map(b=><button key={b.id} className={`brand-tab ${b.id===bId?'active':''}`} onClick={()=>setBId(b.id)}>{b.name}</button>)}
      </div>
      <div className="hdr-right">
        {/* 계약서 생성 — 모델 정보 입력 후 잠금 PDF 다운로드 (브랜드별 광고주 자동) */}
        <button className="contract-link" style={{cursor:'pointer'}} onClick={()=>setCtGenOpen(true)} title="모델명·모델료·계약일자 입력 후 계약서 PDF 생성">📄 계약서 생성</button>
        {ctGenOpen&&<ContractGenModal brandId={bId} brandName={brand?.name} onClose={()=>setCtGenOpen(false)}/>}
        {/* 자주 쓰는 것만 노출 */}
        {BRAND_DRIVE[bId]&&<a href={BRAND_DRIVE[bId]} target="_blank" rel="noopener" className="btn btn-ghost" style={{fontSize:11,textDecoration:'none'}}>📁 드라이브</a>}
        {isManager&&<button className="btn btn-ghost" style={{fontSize:11}} onClick={importFromSheet} disabled={syncing}>
          {syncing?'가져오는 중…':'📥 시트에서 가져오기'}
        </button>}
        {/* 시트 링크·중복 제거만 ⚙️ 관리 메뉴로 정리 */}
        {isManager&&<div style={{position:'relative'}}>
          <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setMenuOpen(o=>!o)} title="관리 메뉴">⚙️ 관리 ▾</button>
          {menuOpen&&<>
            <div onClick={()=>setMenuOpen(false)} style={{position:'fixed',inset:0,zIndex:40}}/>
            <div className="menu-pop">
              <button className="menu-item" onClick={()=>{setMenuOpen(false);setModal('paManage');}}>👥 담당자 관리</button>
              <button className="menu-item" onClick={()=>{setMenuOpen(false);setSheetModal(true);}}>🔗 시트 링크 설정</button>
              <button className="menu-item" onClick={()=>{setMenuOpen(false);deduplicateData();}}>🧹 중복 데이터 제거</button>
            </div>
          </>}
        </div>}
        {/* 자동저장 상태 표시기 — 항상 노출(평소 '저장됨'), 편집 시 '저장 중…', 실패 시 재시도 */}
        {saveState==='error'
          ? <button onClick={()=>{retryRef.current=0;postData({brands,settlements,paList},++saveSeqRef.current);}} title={'저장 실패 사유: '+(saveErrRef.current||'네트워크')+'\n눌러서 다시 시도 (현재 편집분은 이 기기에 안전하게 보관돼 있어요)'}
              style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,fontWeight:600,color:'#b91c1c',background:'#fee2e2',border:'1px solid var(--red)',borderRadius:5,padding:'3px 8px',cursor:'pointer',whiteSpace:'nowrap'}}>⚠ 저장 실패 · 재시도</button>
          : <span title="변경하면 자동으로 저장돼요" style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,whiteSpace:'nowrap',color:saveState==='saved'?'#15803d':'var(--muted)'}}>
              {saveState==='saving'?<><span style={{width:6,height:6,borderRadius:'50%',background:'var(--muted)'}}/>저장 중…</>:<>✓ 저장됨</>}
            </span>}
        {msg&&<span style={{fontSize:11,color:'var(--muted)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{msg}</span>}
        <button className="btn btn-ghost" style={{fontSize:11,color:'var(--red)'}} onClick={onLogout}>로그아웃</button>
      </div>
    </div>

    <div className="step-tabs">
      {primaryTabs.map(t=>(
        <button key={t.key} className={`step-tab ${t.mgr?'settle-tab':''} ${t.guide?'guide-tab':''} ${tab===t.key?'active':''}`}
          onClick={()=>setTab(t.key)}>
          {t.label}
          {t.key==='step1'&&brand.step1Rows.filter(r=>r.reviewStatus==='검수대기'&&r.name).length>0&&(
            <span style={{marginLeft:6,background:'var(--red)',borderRadius:10,padding:'1px 6px',fontSize:10,color:'#fff'}}>
              {brand.step1Rows.filter(r=>r.reviewStatus==='검수대기'&&r.name).length}
            </span>
          )}
        </button>
      ))}
      {moreTabs.length>0&&<div style={{position:'relative',display:'inline-block'}}>
        <button className={`step-tab ${activeMore?'active':''}`} onClick={()=>setMoreOpen(o=>!o)} title="그 외 메뉴">
          ⋯ 더보기{activeMore?` · ${activeMore.label}`:''} ▾
        </button>
        {moreOpen&&<>
          <div onClick={()=>setMoreOpen(false)} style={{position:'fixed',inset:0,zIndex:40}}/>
          <div className="menu-pop" style={{zIndex:41}}>
            {moreTabs.map(t=><button key={t.key} className="menu-item" onClick={()=>{setTab(t.key);setMoreOpen(false);}}>{t.label}</button>)}
          </div>
        </>}
      </div>}
    </div>

    <div className="main">
      {tab==='dashboard'&&<DashboardView
        brand={brand}
        isManager={isManager}
        isStaff={isStaff}
        authInfo={authInfo}
        setTab={setTab}
        setFilter={setFilter}
        onAddStep1={()=>{setTab('step1');setModal('addStep1');}}
      />}
      {tab==='step1'&&<Step1View
        rows={brand.step1Rows||[]}
        onUpdate={updateStep1Row}
        onDelete={deleteStep1Row}
        onAdd={()=>setModal('addStep1')}
        onPasteImport={()=>setModal('pasteStep1')}
        filter={filter} setFilter={setFilter}
        search={search} setSearch={setSearch}
      />}
      {tab==='step2'&&<Step2View
        brand={brand}
        rows={brand.step2Rows||[]}
        privacyRows={brand.privacyRows||[]}
        onUpdate={updateStep2Row}
        onDelete={deleteStep2Row}
        onAddPrivacy={r=>setPrivacyModalRow({channelName:r.name,realName:'',phone:r.phone,pa:sanitizePA(r.pa)})}
        filter={filter} setFilter={setFilter}
        search={search} setSearch={setSearch}
      />}
      {tab==='claudeS2'&&<div style={{flex:'1 1 0',minWidth:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',background:'var(--surface2)'}}>
          <span style={{fontSize:12,color:'var(--muted)'}}>🤖 Claude가 발굴한 인플루언서 — 리스트업·컨택을 한 곳에서 (DM발송·협업성사 체크)</span>
          <span style={{fontSize:11,color:'var(--muted)'}}>{(brand.claudeStep2Rows||[]).length}명</span>
          <button className="btn btn-primary" style={{fontSize:11}} onClick={addClaudeS2Row}>＋ 추가</button>
          {(brand.claudeStep1Rows||[]).length>0&&<button className="btn" style={{fontSize:11,background:'var(--accent)',color:'#fff'}} onClick={mergeClaudeListup}>📥 기존 리스트업 {(brand.claudeStep1Rows||[]).length}명 합치기</button>}
          {bId==='granny'&&<button className="btn" style={{fontSize:11,background:'var(--surface3)',color:'var(--text)',marginLeft:'auto'}} onClick={seedClaudeGranny}>🤖 발굴 50명 불러오기</button>}
        </div>
        <Step2View
          brand={brand}
          isClaude={true}
          rows={brand.claudeStep2Rows||[]}
          privacyRows={brand.privacyRows||[]}
          onUpdate={updateClaudeS2Row}
          onDelete={deleteClaudeS2Row}
          onAddPrivacy={r=>setPrivacyModalRow({channelName:r.name,realName:'',phone:r.phone,pa:sanitizePA(r.pa)})}
          filter={filter} setFilter={setFilter}
          search={search} setSearch={setSearch}
        />
      </div>}
      {tab==='shipping'&&<ShippingView
        brand={brand}
        rows={brand.shippingRows||[]}
        step2Rows={brand.step2Rows||[]}
        reviewRows={brand.reviewRows||[]}
        privacyRows={brand.privacyRows||[]}
        onUpdate={updateShipRow}
        onDelete={deleteShipRow}
        onAdd={()=>setModal('addShip')}
        onPasteImport={()=>setModal('pasteShip')}
        filter={filter} setFilter={setFilter}
        search={search} setSearch={setSearch}
      />}
      {tab==='dm'&&<DMView brand={brand}/>}
      {tab==='review'&&<ReviewView
        brand={brand}
        rows={brand.reviewRows||[]}
        privacyRows={brand.privacyRows||[]}
        step2Rows={brand.step2Rows||[]}
        onUpdate={updateReviewRow}
        onDelete={deleteReviewRow}
        onAdd={()=>setModal('addReview')}
        onPasteImport={()=>setModal('pasteReview')}
        onUpdatePrivacy={updatePrivacyRow}
        onAddPrivacy={addPrivacyRow}
        onSettle={setInfSettledByName}
        isManager={isManager}
        filter={filter} setFilter={setFilter}
        search={search} setSearch={setSearch}
      />}
      {tab==='settle'&&<SettleView
        brand={brand}
        settlements={settlements}
        setSettlements={setSettlements}
        staffPA={isManager?null:(authInfo?.pa||'')}
      />}
      {tab==='guide'&&<GuideView brand={brand}/>}
      {tab==='users'&&<UserMgmtView/>}
      {tab==='log'&&<AccessLogView/>}
    </div>

    {sheetModal&&<SheetLinkModal
      brand={brand}
      onSave={links=>{
        updateBrand(bId,b=>({...b,sheetLinks:links}));
        immediateRef.current=true;
        setMsg('✅ 시트 링크 저장됨');
      }}
      onClose={()=>setSheetModal(false)}
    />}

    {modal==='paManage'&&<PaManageModal paList={paList} setPaList={setPaList} onClose={()=>setModal(null)}/>}
    {modal==='addStep1'&&<AddStep1Modal onConfirm={r=>{addStep1Row(r);setModal(null);}} onCancel={()=>setModal(null)}/>}
    {modal==='pasteStep1'&&<PasteImportModal kind="step1" onConfirm={rows=>{const {added,skipped}=addStep1RowsBulk(rows);setModal(null);setMsg(`📋 ${added}명 추가${skipped>0?` · 중복 ${skipped}명 건너뜀`:''}`);}} onCancel={()=>setModal(null)}/>}
    {modal==='pasteShip'&&<PasteImportModal kind="ship" onConfirm={rows=>{const {added,skipped}=addShipRowsBulk(rows);setModal(null);setMsg(`📋 출고 ${added}건 추가${skipped>0?` · 중복 ${skipped}건 건너뜀`:''}`);}} onCancel={()=>setModal(null)}/>}
    {modal==='pasteReview'&&<PasteImportModal kind="review" onConfirm={rows=>{const {added,skipped}=addReviewRowsBulk(rows);setModal(null);setMsg(`📋 영상검수 ${added}건 추가${skipped>0?` · 중복 ${skipped}건 건너뜀`:''}`);}} onCancel={()=>setModal(null)}/>}
    {modal==='addClaudeS1'&&<AddStep1Modal onConfirm={r=>{addClaudeS1Row(r);setModal(null);}} onCancel={()=>setModal(null)}/>}
    {modal==='addShip'&&<AddShipModal onConfirm={r=>{addShipRow(r);setModal(null);}} onCancel={()=>setModal(null)}/>}
    {modal==='addReview'&&<AddReviewModal onConfirm={r=>{addReviewRow(r);setModal(null);}} onCancel={()=>setModal(null)}/>}
    {modal==='addPrivacy'&&<AddPrivacyModal prefill={privacyPrefill} onConfirm={r=>{addPrivacyRow(r);setModal(null);setPrivacyPrefill(null);}} onCancel={()=>{setModal(null);setPrivacyPrefill(null);}}/>}
    {/* 컨택현황에서 '개인정보 제출' → 영상검수와 동일한 개인정보 입력(통장·신분증 OCR) 모달 */}
    {privacyModalRow&&isManager&&<ReviewPrivacyModal row={privacyModalRow} privacyRows={brand.privacyRows||[]}
      onUpdatePrivacy={(id,patch)=>{updatePrivacyRow(id,patch);ensureReviewRow({channelName:patch.channelName,realName:patch.realName,pa:privacyModalRow.pa});}}
      onAddPrivacy={(r)=>{addPrivacyRow(r);ensureReviewRow({channelName:r.channelName,realName:r.realName,pa:privacyModalRow.pa});}}
      onClose={()=>setPrivacyModalRow(null)}/>}
  </>;
}

class EB extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err) return (
      <div style={{padding:24,color:'#b91c1c',fontFamily:'monospace',background:'#fff',height:'100vh'}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:12}}>⚠️ 렌더링 오류</div>
        <div style={{fontSize:13,marginBottom:8}}>{this.state.err.message}</div>
        <pre style={{fontSize:11,color:'#71717a',whiteSpace:'pre-wrap'}}>{this.state.err.stack}</pre>
        <button style={{marginTop:16,padding:'6px 16px',background:'#6366f1',border:'none',borderRadius:6,color:'#fff',cursor:'pointer'}}
          onClick={()=>{
            localStorage.removeItem('pa_mgr_v5');
            callApi('save',{data:{brands:[],settlements:{},paList:[]},force:1})
              .finally(()=>window.location.reload());
          }}>
          데이터 초기화 후 새로고침
        </button>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<EB><App/></EB>);
</script>
</body>
</html>
