          <th style={{width:50}}>링크</th>
          <th style={{width:80}}>팔로워</th>
          <th style={{width:75}}>담당 PA</th>
          <th style={{minWidth:100}}>페르소나</th>
          <th style={{width:90}}>검수 상태</th>
          <th style={{minWidth:160}}>메모</th>
        </tr>
        {showColF&&<tr className="colf-row">
          {[null,'date','name','link','followers','pa','persona','reviewStatus','memo'].map((f,i)=>(
            <th key={i} style={{padding:'2px 4px'}}>{f&&<input className="colf-inp" value={colF[f]||''} onChange={e=>setCol(f,e.target.value)} placeholder="필터"/>}</th>
          ))}
        </tr>}
        </thead>
        <tbody>
          {shown.map(r=><tr key={r.id}>
            <td className="del-col"><span style={{display:'inline-flex',alignItems:'center',gap:2}}>
              <span draggable onDragStart={e=>{e.dataTransfer.setData('text/plain',r.id);e.dataTransfer.effectAllowed='move';}} title="끌어다 위 카테고리 칩에 놓으면 분류돼요" style={{cursor:'grab',color:'var(--dim)',fontSize:13,userSelect:'none'}}>⠿</span>
              <button className="row-del-btn" onClick={()=>onDelete(r.id)}>×</button>

function Step2View({ brand, rows, privacyRows, onUpdate, onDelete, onAddPrivacy, filter, setFilter, search, setSearch, isClaude }) {
  const [dayFilter,setDayFilter]=useState(null);
  const [monthFilter,setMonthFilter]=useState(null);
  const [sortDir,setSortDir]=useState('asc');   // 날짜 정렬: 'asc'=오래된순(기본), 'desc'=최신순
  const [colF,setColF]=useState({}); const [showColF,setShowColF]=useState(false);
  const q=search.trim().toLowerCase();
  const s2=v=>String(v||'');
  const colFActive=Object.entries(colF).filter(([,v])=>String(v||'').trim());
  function setCol(f,v){setColF(p=>({...p,[f]:v}));}
  const cfVal=(r,f)=>f==='contactStatus'?normStatus(r.contactStatus):s2(r[f]);
  // '전체'=진행 중만(보관 제외). 보관 = 거절 OR 개인정보 폐기 완료 → 데이터·정산은 그대로 두고 '📦 보관' 칩에서만 모아 봄.
  const isRej=r=>normStatus(r.contactStatus)==='거절';
  const isArchived=r=>isRej(r)||r.privacyPurged;
  const named=rows.filter(r=>s2(r.name).trim());
  const mode=filter==='rej'?'reject':filter==='arc'?'archive':'active';
  const byDayAll=dayFilter?named.filter(r=>parseDateKey(r.date)===dayFilter):monthFilter?named.filter(r=>parseYM(r.date)===monthFilter):named;
  const byDay=colFActive.length?byDayAll.filter(r=>colFActive.every(([f,v])=>cfVal(r,f).toLowerCase().includes(v.trim().toLowerCase()))):byDayAll;
  const shown=byDay.filter(r=>{
    // 검색은 보관 포함 전체에서 — 누적돼도 누구든 찾을 수 있게.
    if(q) return [r.name,r.pa,r.memo,r.contactStatus].some(v=>s2(v).toLowerCase().includes(q));
    if(filter==='dm') return r.dmSent==='Y';
    if(filter==='deal') return r.dealDone==='Y';
    if(filter==='nd') return r.dmSent!=='Y'&&!isArchived(r);
    if(filter==='rej') return isRej(r);
    if(filter==='arc') return isArchived(r);
    return !isArchived(r); // 'all' = 진행 중만
  }).sort((a,b)=>{   // 날짜 정렬(최신순/오래된순 토글) — 같은 날짜는 기존 순서 유지(안정 정렬)
    const ka=parseDateKey(a.date),kb=parseDateKey(b.date);
    if(!ka&&!kb) return 0;
    if(!ka) return 1;   // 날짜 없는 행은 방향과 무관하게 맨 아래로
    if(!kb) return -1;
    const base=ka<kb?-1:ka>kb?1:0;   // 오름차순 기준
    return sortDir==='asc'?base:-base;
  });
  const cnt={all:named.filter(r=>!isArchived(r)).length,dm:named.filter(r=>r.dmSent==='Y').length,deal:named.filter(r=>r.dealDone==='Y').length,nd:named.filter(r=>r.dmSent!=='Y'&&!isArchived(r)).length,rej:named.filter(isRej).length,arc:named.filter(isArchived).length};
  function up(id,k,v){onUpdate(id,{[k]:v});}
  // 협업성사/DM발송을 Y로 바꾸면 날짜 자동 기록, 다시 N으로 해제하면 날짜도 같이 제거(정산 월 구분 일관성).
  function setDeal(r,v){const patch={dealDone:v};if(v==='Y'&&!r.dealDate)patch.dealDate=today();if(v!=='Y')patch.dealDate='';onUpdate(r.id,patch);}
  function setDm(r,v){const patch={dmSent:v};if(v==='Y'&&!r.dmDate)patch.dmDate=today();if(v!=='Y')patch.dmDate='';onUpdate(r.id,patch);}
  // 진행 상태를 '거절'로 바꾸면 거절일 자동 기록(그달 DM 수당 정산 기준), 벗어나면 제거.
  function setStatus(r,v){const patch={contactStatus:v};if(v==='거절'&&!r.rejectDate)patch.rejectDate=today();if(v!=='거절')patch.rejectDate='';onUpdate(r.id,patch);}

  return <div className="view-wrap">
    <div className="view-main">
    <div className="toolbar">
      {[{k:'all',l:`진행 중 (${cnt.all})`,c:''},{k:'dm',l:`DM 발송 (${cnt.dm})`,c:'f-dm'},{k:'deal',l:`협업 성사 (${cnt.deal})`,c:'f-deal'},{k:'nd',l:`미발송 (${cnt.nd})`,c:'f-wt'},{k:'rej',l:`🚫 거절 (${cnt.rej})`,c:'f-rj'},{k:'arc',l:`📦 보관 (${cnt.arc})`,c:'f-arc'}]
        .map(({k,l,c})=><button key={k} className={`fchip ${c} ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{l}</button>)}
      <button className={`fchip ${showColF||colFActive.length?'active':''}`} onClick={()=>setShowColF(v=>!v)} title="열마다 필터를 겁니다">🔽 열 필터{colFActive.length?` (${colFActive.length})`:''}</button>
      {colFActive.length>0&&<button className="fchip" onClick={()=>setColF({})}>✕ 초기화</button>}
      <div className="sep"/>
      <button className="fchip" style={{whiteSpace:'nowrap'}} onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')} title="날짜 정렬 전환 (최신순 ↔ 오래된순)">
        {sortDir==='desc'?'📅 최신순 ↓':'📅 오래된순 ↑'}
      </button>
      <div className="search-wrap">
        <input className="srch" placeholder="채널명, PA, 메모…" value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==='Escape'&&setSearch('')}/>
        {search&&<button className="srch-x" onClick={()=>setSearch('')}>×</button>}
      </div>
      <span className="cnt">{shown.length}명</span>
    </div>
    {(mode==='archive'||mode==='reject')&&<div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',padding:'7px 12px',margin:'0 0 2px',background:'var(--surface2)',borderTop:'1px solid var(--border)',borderBottom:'1px solid var(--border)',fontSize:12,color:'var(--muted)'}}>
      {mode==='archive'
        ? <><span>📦 <b style={{color:'var(--orange)'}}>보관</b> — 거절했거나 개인정보가 폐기된 인플루언서 모음</span>
            <span style={{color:'var(--dim)'}}>·</span>
            <span>데이터·수당 정산은 <b>그대로 보존</b>됩니다 (지워지지 않음)</span></>
        : <><span>🚫 <b style={{color:'var(--red)'}}>거절</b> 인플루언서 모음</span>
            <span style={{color:'var(--dim)'}}>·</span>
            <span>진행상태를 다른 값으로 바꾸면 <b>컨택현황</b>으로 돌아갑니다</span></>}
    </div>}
    <div className="table-wrap">

          <th className="del-col"></th>
          <th style={{width:80,cursor:'pointer',userSelect:'none'}} onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')} title="클릭하여 날짜 정렬 전환 (최신순 ↔ 오래된순)">날짜 {sortDir==='desc'?'↓':'↑'}</th>

              {!IS_STAFF&&!isClaude&&<td data-label="성사수당" style={{color:pay.deal>0?'var(--green)':'var(--dim)',fontWeight:600,fontSize:11}}>{fmtMoney(pay.deal)}</td>}

/* ─── SHIPPING VIEW ─── */
function ShippingView({ brand, rows, step2Rows, reviewRows, privacyRows, onUpdate, onDelete, onAdd, onPasteImport, filter, setFilter, search, setSearch }) {
  const [dayFilter,setDayFilter]=useState(null);
  const [monthFilter,setMonthFilter]=useState(null);
  const [reqF,setReqF]=useState(''); // 요청자 필터('' = 전체)
  const [colF,setColF]=useState({}); // 엑셀식 컬럼별 포함검색 필터 {필드:문자열}
  const [showColF,setShowColF]=useState(false);
  const q=search.trim().toLowerCase();
  const product=shipProductOf(brand?.id); // 브랜드별 고정 상품명
  // 요청자 필터 옵션 — 실제 출고행에 있는 요청자(공백 제외) 모음
  const reqOpts=Array.from(new Set((rows||[]).map(r=>r.requester).filter(Boolean)));
  // 수령자명(본명)으로 개인정보에서 채널명을 찾고, 그 채널의 라이브 여부를 컨택현황/영상검수에서 확인 — 출고↔영상 매칭.
  // 채널명/이름은 공백·대소문자 차이를 무시하고 매칭(연동 누락 방지).
  const norm=s=>String(s||'').trim().toLowerCase().replace(/\s+/g,'');
  const chanOf=recipient=>{const n=norm(recipient);if(!n)return '';const p=(privacyRows||[]).find(p=>p.realName&&norm(p.realName)===n);return p?p.channelName:'';};
  // 라이브 매칭 — 채널명뿐 아니라 수령자 본명으로도 연결(영상검수 본명=출고 수령자).
  // 출고에 채널명/개인정보 다리가 없어도 영상검수 행의 realName이 수령자명과 같으면 인정.
  const liveOf=(ch,recipient)=>{
    const keys=new Set([norm(ch),norm(recipient)].filter(Boolean));
    if(!keys.size)return null;
    return (step2Rows||[]).find(x=>x.live==='Y'&&keys.has(norm(x.name)))
        || (reviewRows||[]).find(x=>x.live==='Y'&&(keys.has(norm(x.channelName))||keys.has(norm(x.realName))))
        || null;
  };
  // 라이브(영상 업로드) 여부 — 매칭되는 컨택현황/영상검수 행이 라이브로 표시된 경우만.
  // '완료' 탭 = 라이브가 실제로 시작된 건들만. 처리상태 '완료'와는 별개.
  const isLiveRow=r=>!!liveOf(r.channelName||chanOf(r.recipient),r.recipient);
  // 엑셀식 컬럼 필터용 — 각 컬럼의 표시 문자열
  const liveText=r=>{const lv=liveOf(r.channelName||chanOf(r.recipient),r.recipient);return lv?('라이브 '+(lv.liveDate||'')):'대기';};
  const fieldVal=(r,f)=>{
    if(f==='product') return product||'';
    if(f==='live') return liveText(r);
    if(f==='channelName') return r.channelName||chanOf(r.recipient)||'';
    return String(r[f]||'');
  };
  const colFActive=Object.entries(colF).filter(([,v])=>String(v||'').trim());
  const byDay=dayFilter?rows.filter(r=>parseDateKey(r.requestDate)===dayFilter):monthFilter?rows.filter(r=>parseYM(r.requestDate)===monthFilter):rows;
  const shown=byDay
    .filter(r=>{
      // 라이브 시작된 건은 전체 목록에서 빼고 '완료' 탭으로만 모음
      if(filter==='all'&&isLiveRow(r)) return false;
      if(filter==='done'&&!isLiveRow(r)) return false;
      if(filter==='pend'&&(isLiveRow(r)||r.status?.includes('완료'))) return false;
      if(reqF&&(r.requester||'')!==reqF) return false;
      if(colFActive.length && !colFActive.every(([f,v])=>fieldVal(r,f).toLowerCase().includes(String(v).trim().toLowerCase()))) return false;
      if(q) return [r.requester,r.recipient,r.address,product,r.tracking].some(v=>v&&String(v).toLowerCase().includes(q));
      return true;
    });
  const cnt={all:rows.filter(r=>!isLiveRow(r)).length,done:rows.filter(isLiveRow).length,pend:rows.filter(r=>!isLiveRow(r)&&!r.status?.includes('완료')).length};
  function up(id,k,v){onUpdate(id,{[k]:v});}
  function setCol(f,v){setColF(p=>({...p,[f]:v}));}
  return <div className="view-wrap">
    <div className="view-main">
    <div className="toolbar">
      {[{k:'all',l:`전체 (${cnt.all})`,c:''},{k:'done',l:`완료 (${cnt.done})`,c:'f-done'},{k:'pend',l:`처리중 (${cnt.pend})`,c:'f-wt'}]
        .map(({k,l,c})=><button key={k} className={`fchip ${c} ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{l}</button>)}
      <select className={`fsel ${reqF?'active':''}`} value={reqF} onChange={e=>setReqF(e.target.value)} title="요청자 필터">
        <option value="">요청자 전체</option>
        {reqOpts.map(p=><option key={p} value={p}>{p}</option>)}
      </select>
      <button className={`fchip ${showColF||colFActive.length?'active':''}`} onClick={()=>setShowColF(v=>!v)} title="엑셀처럼 열마다 필터를 겁니다">🔽 열 필터{colFActive.length?` (${colFActive.length})`:''}</button>
      {colFActive.length>0&&<button className="fchip" onClick={()=>setColF({})} title="모든 열 필터 지우기">✕ 필터 초기화</button>}
      <button className="fchip" onClick={onPasteImport} title="구글 시트에서 복사한 데이터를 붙여넣어 한 번에 추가">📋 붙여넣기로 추가</button>
      <div className="sep"/>
      <div className="search-wrap">
        <input className="srch" placeholder="요청자, 수령자, 상품명…" value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==='Escape'&&setSearch('')}/>
        {search&&<button className="srch-x" onClick={()=>setSearch('')}>×</button>}
      </div>
      <span className="cnt">{shown.length}건</span>
    </div>
    <div className="table-wrap">
      <table className="card-table">
        <thead><tr>
          <th className="del-col"></th>
          <th style={{width:85}}>출고요청일</th>
          <th style={{width:75}}>요청자</th>
          <th style={{width:90}}>채널명</th>
          <th style={{width:90}}>수령자명</th>
          <th style={{width:110}}>연락처</th>
          <th style={{minWidth:140}}>배송지 주소</th>
          <th style={{minWidth:100}}>상품명</th>
          <th style={{width:80}}>비고</th>
          <th style={{width:80}}>처리 상태</th>
          <th style={{width:85}}>출고일자</th>
          <th style={{minWidth:110}}>송장번호</th>
          <th style={{width:100,textAlign:'center'}}>라이브</th>
        </tr>
        {showColF&&<tr className="colf-row">
          {[null,'requestDate','requester','channelName','recipient','phone','address','product','notes','status','shipDate','tracking','live'].map((f,i)=>(
            <th key={i} style={{padding:'2px 4px'}}>{f&&<input className="colf-inp" value={colF[f]||''} onChange={e=>setCol(f,e.target.value)} placeholder="필터" title="이 열에서 포함검색"/>}</th>
          ))}
        </tr>}
        </thead>
        <tbody>
          {shown.map(r=><tr key={r.id}>
            <td className="del-col"><button className="row-del-btn" onClick={()=>onDelete(r.id)}>×</button></td>
            <td data-label="출고요청일"><Cell value={r.requestDate} onChange={v=>up(r.id,'requestDate',v)} type="date" style={{width:80}}/></td>
            <td data-label="요청자"><Cell value={r.requester||''} onChange={v=>up(r.id,'requester',v)} type="select" options={PA_LIST}/></td>
            <td data-label="채널명"><Cell value={r.channelName||''} onChange={v=>up(r.id,'channelName',v)} placeholder={chanOf(r.recipient)||'채널명'} style={{color:'var(--blue)',fontSize:11,width:84}}/></td>
            <td data-label="수령자명"><span style={{display:'flex',alignItems:'center',gap:2}}>
              <ShipCopyBtn row={r} product={product}/>
              <Cell value={r.recipient} onChange={v=>up(r.id,'recipient',v)} placeholder="수령자명" style={{flex:1,minWidth:0}}/>
            </span></td>
            <td data-label="연락처"><Cell value={r.phone} onChange={v=>up(r.id,'phone',v)}/></td>
            <td data-label="배송지 주소"><Cell value={r.address} onChange={v=>up(r.id,'address',v)}/></td>
            <td data-label="상품명" style={{whiteSpace:'nowrap',fontWeight:600}}>{product}</td>
            <td data-label="비고"><Cell value={r.notes} onChange={v=>up(r.id,'notes',v)}/></td>
            <td data-label="처리 상태"><Cell value={r.status} onChange={v=>up(r.id,'status',v)} type="select" options={['처리중','✅ 완료']}/></td>
            <td data-label="출고일자"><Cell value={r.shipDate||''} onChange={v=>up(r.id,'shipDate',v)} type="date" style={{width:80}} placeholder="출고일"/></td>
            <td data-label="송장번호"><Cell value={r.tracking} onChange={v=>up(r.id,'tracking',v)} placeholder="송장번호 입력"/></td>
            <td data-label="라이브" style={{textAlign:'center'}}>
              {(()=>{const ch=r.channelName||chanOf(r.recipient);const lv=liveOf(ch,r.recipient);
                if(lv)return <span style={{fontSize:10,color:'var(--green)',fontWeight:700,whiteSpace:'nowrap'}}>🔴 라이브{lv.liveDate?' '+lv.liveDate:''}</span>;
                const exp=addDaysToDate(r.shipDate||r.requestDate,7);
                return <span style={{fontSize:10,color:'var(--dim)',whiteSpace:'nowrap'}}>{exp?'⏳ 예상 '+exp:'⏳ 영상 대기'}</span>;
              })()}
            </td>
          </tr>)}
          <tr className="add-row"><td colSpan={13} style={{padding:'8px 0'}}>
            <button className="btn-add" onClick={onAdd}>+ 출고 추가</button>
          </td></tr>
        </tbody>
      </table>
    </div>
    </div>
    <CalSidebar rows={rows} dateKey="requestDate" dayFilter={dayFilter} setDayFilter={setDayFilter} monthFilter={monthFilter} setMonthFilter={setMonthFilter}/>
  </div>;
}

/* ─── DM TEMPLATE VIEW ─── */
const DIFF_COLOR={'하':'var(--green)','중':'var(--yellow)','중~상':'var(--orange)','상':'var(--red)'};
const STAGE_ORDER=['초반','중반','후반','특수'];
function DMView({brand}){

        {search&&<button className="srch-x" onClick={()=>setSearch('')}>×</button>}

      </div>

            <span style={{background:'transparent',border:`1px solid ${DIFF_COLOR[t.diff]}`,borderRadius:4,padding:'1px 6px',fontSize:10,fontWeight:600,color:DIFF_COLOR[t.diff],whiteSpace:'nowrap'}}>{t.diff}</span>
            <span style={{fontSize:12,fontWeight:600,flex:1}}>{t.title}</span>

          </div>

            {t.insight&&<div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:6,padding:'7px 10px',fontSize:11,color:'#1d4ed8',marginBottom:10}}>💡 {t.insight}</div>}
            <pre style={{background:'var(--surface2)',borderRadius:6,padding:'12px',fontSize:12,color:'var(--text)',whiteSpace:'pre-wrap',wordBreak:'break-word',lineHeight:1.7,margin:0}}>{t.content}</pre>

/* ─── 복사 버튼 — 값을 클립보드에 복사(계좌번호·주민번호 등). 숫자만 옵션(digits) 지원. ─── */
function CopyBtn({value,digits}){
  const [done,setDone]=useState(false);
  function copy(){ const t=digits?String(value||'').replace(/\D/g,''):String(value||''); if(!t) return;
    const ok=()=>{ setDone(true); setTimeout(()=>setDone(false),1200); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(ok).catch(()=>fallback(t,ok)); } else fallback(t,ok); }
  function fallback(t,ok){ try{ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); ok(); }catch{} }
  return <button type="button" onClick={copy} disabled={!value} title="복사" style={{fontSize:11,padding:'0 10px',border:'1px solid var(--border)',borderRadius:6,background:done?'var(--green)':'var(--surface2)',color:done?'#fff':'var(--text)',cursor:value?'pointer':'default',whiteSpace:'nowrap'}}>{done?'✅ 복사됨':'📋 복사'}</button>;
}

/* ─── 영상검수 행별 개인정보 모달 (관리자 전용) — 그 사람만, 통장·신분증 OCR 자동채움 ─── */
function ReviewPrivacyModal({ row, privacyRows, onUpdatePrivacy, onAddPrivacy, onClose }){
  const norm=v=>String(v||'').trim().toLowerCase().replace(/\s+/g,'');
  const existing=(privacyRows||[]).find(p=>norm(p.channelName)&&norm(p.channelName)===norm(row.channelName))
    || (row.realName?(privacyRows||[]).find(p=>norm(p.realName)&&norm(p.realName)===norm(row.realName)):null)
    || null;
  const [f,setF]=useState(()=>({
    id: existing?.id||null,
    channelName: row.channelName||row.name||existing?.channelName||'',
    realName: row.realName||existing?.realName||'',
    phone: existing?.phone||row.phone||'', address: existing?.address||'',
    bankFile: existing?.bankFile||null, idFile: existing?.idFile||null,
    bankName: existing?.bankName||'', bankHolder: existing?.bankHolder||'', bankAccount: existing?.bankAccount||'',
    rrn: existing?.rrn||'',
  }));
  const [ocrMsg,setOcrMsg]=useState('');
  // 학습용 — 마지막 통장 OCR 원문과 자동인식된 은행명을 기억(저장 시 사용자가 고쳤으면 별칭 학습)
  const bankRaw=useRef(''); const bankAuto=useRef('');
  const u=k=>e=>setF(p=>({...p,[k]:typeof e==='string'?e:e.target.value}));
  const prog=label=>m=>setOcrMsg(label+' 인식 중… '+(m.status==='recognizing text'?Math.round((m.progress||0)*100)+'%':'(처음엔 한글 데이터 받느라 수십 초)'));
  async function onBankPick(file){
    autoB.current=true;
    setOcrMsg('💳 통장 인식 준비 중…');
    const text=await ocrImage(file,prog('💳 통장')); const r=parseBank(text);
    bankRaw.current=text; bankAuto.current=r.bank||'';
    setF(p=>({...p, bankName:r.bank||p.bankName, bankHolder:r.holder||p.bankHolder, bankAccount:r.account||p.bankAccount}));
    setOcrMsg((r.bank||r.account||r.holder)?'✅ 통장 자동 인식됨 — 꼭 확인·수정하세요':(_ocrErr?'⚠️ 인식 오류: '+_ocrErr:'⚠️ 통장에서 못 읽었어요 — 직접 입력하세요'));
  }
  async function onIdPick(file){
    autoI.current=true;
    setOcrMsg('🪪 신분증 인식 준비 중…');
    const rrn=parseRRN(await ocrImage(file,prog('🪪 신분증')));
    setF(p=>({...p, rrn:rrn||p.rrn}));
    setOcrMsg(rrn?'✅ 주민번호 자동 인식됨 — 꼭 확인·수정하세요':(_ocrErr?'⚠️ 인식 오류: '+_ocrErr:'⚠️ 신분증에서 못 읽었어요 — 직접 입력하세요'));
  }
  // ── 기존에 이미 첨부된 파일도 모달 열면 자동 인식(빈 칸만 채움) — 새로 안 올려도 자동으로 뜨게 ──
  const bankSrc=useFileSrc(f.bankFile); const idSrc=useFileSrc(f.idFile);
  const autoB=useRef(false), autoI=useRef(false);
  useEffect(()=>{ if(!bankSrc||autoB.current||(f.bankName&&f.bankAccount)) return; autoB.current=true;
    (async()=>{ setOcrMsg('💳 기존 통장 자동 인식 중… (처음엔 한글 데이터 받느라 수십 초)'); const t=await ocrImage(bankSrc); const r=parseBank(t); bankRaw.current=t; bankAuto.current=r.bank||'';
      setF(p=>({...p, bankName:p.bankName||r.bank, bankHolder:p.bankHolder||r.holder, bankAccount:p.bankAccount||r.account}));
      setOcrMsg((r.bank||r.account||r.holder)?'✅ 기존 통장 자동 인식됨 — 확인·수정하세요':(_ocrErr?'⚠️ 인식 오류: '+_ocrErr:'')); })();
  },[bankSrc]);
  useEffect(()=>{ if(!idSrc||autoI.current||f.rrn) return; autoI.current=true;
    (async()=>{ setOcrMsg(m=>m||'🪪 기존 신분증 자동 인식 중…'); const rrn=parseRRN(await ocrImage(idSrc));
      if(rrn) setF(p=>({...p, rrn:p.rrn||rrn})); if(rrn) setOcrMsg('✅ 기존 신분증 주민번호 자동 인식됨 — 확인·수정하세요'); })();
  },[idSrc]);
  function save(){
    // 학습: 통장을 OCR로 올렸는데(원문 있음) 사용자가 은행명을 자동인식과 다르게 고쳤으면 별칭으로 기억 → 다음 인식부터 반영
    const bn=String(f.bankName||'').trim();
    if(bn && bankRaw.current && bn!==bankAuto.current) learnBankAlias(bankRaw.current, bn);
    const patch={channelName:f.channelName,realName:f.realName,phone:f.phone,address:f.address,bankFile:f.bankFile,idFile:f.idFile,bankName:f.bankName,bankHolder:f.bankHolder,bankAccount:f.bankAccount,rrn:f.rrn};
    if(f.id) onUpdatePrivacy(f.id,patch); else onAddPrivacy({id:makeId(),notes:'',...patch});
    onClose();
  }
  return <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="modal-title">🔒 개인정보 — {f.channelName||f.realName||'대상'}</div>
      <div style={{fontSize:11,color:'var(--muted)',margin:'2px 0 10px',lineHeight:1.5}}>관리자 전용 · 통장/신분증을 올리면 자동 인식해 채워줍니다(부정확할 수 있어 <b>반드시 확인·수정</b>). · 은행명을 고쳐 저장하면 <b>다음 인식부터 학습</b>돼요.</div>
      <div className="modal-grid">
        <div><div className="modal-lbl">성명</div><input className="modal-inp" value={f.realName} onChange={u('realName')}/></div>
        <div><div className="modal-lbl">연락처</div><input className="modal-inp" value={f.phone} onChange={u('phone')} placeholder="010-0000-0000"/></div>
        <div className="modal-full"><div className="modal-lbl">주소</div><input className="modal-inp" value={f.address} onChange={u('address')}/></div>
        <div className="modal-full"><div className="modal-lbl">💳 통장사본 <span style={{color:'var(--dim)',fontSize:10}}>(올리면 예금주·은행·계좌 자동인식)</span></div>
          <FileUpload label="통장사본 첨부" value={f.bankFile} onChange={v=>setF(p=>({...p,bankFile:v}))} onPick={onBankPick}/>
        </div>
        <div><div className="modal-lbl">은행</div><input className="modal-inp" value={f.bankName} onChange={u('bankName')} placeholder="예: 국민"/></div>
        <div><div className="modal-lbl">예금주</div><input className="modal-inp" value={f.bankHolder} onChange={u('bankHolder')}/></div>
        <div className="modal-full"><div className="modal-lbl">계좌번호</div>
          <div style={{display:'flex',gap:6}}><input className="modal-inp" style={{flex:1}} value={f.bankAccount} onChange={u('bankAccount')}/><CopyBtn value={f.bankAccount} digits/></div></div>
        <div className="modal-full"><div className="modal-lbl">🪪 신분증사본 <span style={{color:'var(--dim)',fontSize:10}}>(올리면 주민번호 자동인식)</span></div>
          <FileUpload label="신분증사본 첨부" value={f.idFile} onChange={v=>setF(p=>({...p,idFile:v}))} onPick={onIdPick}/>
        </div>
        <div className="modal-full"><div className="modal-lbl">주민등록번호</div>
          <div style={{display:'flex',gap:6}}><input className="modal-inp" style={{flex:1}} value={f.rrn} onChange={u('rrn')} placeholder="000000-0000000"/><CopyBtn value={f.rrn}/></div></div>
      </div>
      {ocrMsg&&<div style={{fontSize:12,color:'var(--accent)',marginTop:8}}>{ocrMsg}</div>}
      <div className="modal-foot">
        <button className="btn btn-ghost" onClick={onClose}>취소</button>
        <button className="btn btn-primary" onClick={save}>저장</button>
      </div>
    </div>
  </div>;
}

/* ─── REVIEW VIEW ─── */
function ReviewView({ brand, rows, privacyRows, step2Rows, onUpdate, onDelete, onAdd, onPasteImport, filter, setFilter, search, setSearch, onUpdatePrivacy, onAddPrivacy, onSettle, isManager }) {
  const [dayFilter,setDayFilter]=useState(null);
  const [monthFilter,setMonthFilter]=useState(null);
  const [openId,setOpenId]=useState(null);
  const [pvRow,setPvRow]=useState(null); // 개인정보 모달 대상 행(관리자 전용)
  const [copiedAll,setCopiedAll]=useState(false);
  const [colF,setColF]=useState({}); const [showColF,setShowColF]=useState(false);
  const q=search.trim().toLowerCase();
  const s=v=>String(v||'');
  const colFActive=Object.entries(colF).filter(([,v])=>String(v||'').trim());
  function setCol(f,v){setColF(p=>({...p,[f]:v}));}
  // 채널명으로 개인정보 행을 찾아 본명 표시 — 채널명만으로 헷갈리지 않게.
  const nameOf=ch=>((privacyRows||[]).find(p=>p.channelName===ch)||{}).realName||'';
  // ── 정산 상태 매칭 — 컨택현황(step2)의 채널명으로 연결. 개인정보에서 정산 처리하면 step2에 기록됨.
  //    paid=정산완료 / purged=정산 후 개인정보 폐기(정산된 것으로 간주) / unpaid=미정산
  const norm=v=>String(v||'').trim().toLowerCase().replace(/\s+/g,'');
  const s2=step2Rows||[];
  const settleOf=r=>{const n=norm(r.channelName);if(!n)return{};return s2.find(x=>norm(x.name)===n)||{};};
  const settleState=r=>{const st=settleOf(r);return st.privacyPurged?'purged':st.infSettled==='Y'?'paid':'unpaid';};
  const byDay=dayFilter?rows.filter(r=>parseDateKey(r.date)===dayFilter):monthFilter?rows.filter(r=>parseYM(r.date)===monthFilter):rows;
  const shown=byDay
    .filter(r=>{
      if(colFActive.length && !colFActive.every(([f,v])=>s(r[f]).toLowerCase().includes(v.trim().toLowerCase()))) return false;
      const ss=settleState(r);
      if(filter==='paid'&&!(ss==='paid'||ss==='purged')) return false;
      if(filter==='unpaid'&&ss!=='unpaid') return false;
      if(filter==='purged'&&ss!=='purged') return false;
      if(filter==='live'&&r.live!=='Y') return false;
      if(q) return [r.channelName,r.pa,r.paCode,r.memo].some(v=>s(v).toLowerCase().includes(q));
      return true;
    });
  const cnt={all:rows.length,
    paid:rows.filter(r=>{const ss=settleState(r);return ss==='paid'||ss==='purged';}).length,
    unpaid:rows.filter(r=>settleState(r)==='unpaid').length,
    purged:rows.filter(r=>settleState(r)==='purged').length,
    live:rows.filter(r=>r.live==='Y').length};
  function up(id,k,v){onUpdate(id,{[k]:v});}
  const driveLink=brand?BRAND_DRIVE[brand.id]:null;
  // PA 코드 한번에 복사 — 현재 화면(shown)에 있는 코드들을 줄바꿈으로 모아 복사.
  const paCodes=shown.map(r=>String(r.paCode||'').trim()).filter(Boolean);
  function copyAllCodes(){
    if(!paCodes.length)return;
    const t=paCodes.join('\n');
    const ok=()=>{setCopiedAll(true);setTimeout(()=>setCopiedAll(false),1500);};
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).then(ok).catch(()=>{});else ok();
  }

  return <div className="view-wrap">
    <div className="view-main">
    <div className="toolbar">
      {[{k:'all',l:`전체 (${cnt.all})`,c:''},{k:'paid',l:`✅ 정산완료 (${cnt.paid})`,c:'f-ap'},{k:'unpaid',l:`⏳ 미정산 (${cnt.unpaid})`,c:'f-wt'},{k:'purged',l:`🗑️ 폐기완료 (${cnt.purged})`,c:'f-rj'},{k:'live',l:`🔴 라이브 (${cnt.live})`,c:'f-deal'}]
        .map(({k,l,c})=><button key={k} className={`fchip ${c} ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{l}</button>)}
      <div className="sep"/>
      <div className="search-wrap">
        <input className="srch" placeholder="채널명, PA코드…" value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==='Escape'&&setSearch('')}/>
        {search&&<button className="srch-x" onClick={()=>setSearch('')}>×</button>}
      </div>
      <span className="cnt">{shown.length}건</span>
      <button className={`fchip ${showColF||colFActive.length?'active':''}`} onClick={()=>setShowColF(v=>!v)} title="열마다 필터를 겁니다">🔽 열 필터{colFActive.length?` (${colFActive.length})`:''}</button>
      {colFActive.length>0&&<button className="fchip" onClick={()=>setColF({})}>✕ 초기화</button>}
      <button className="fchip" onClick={onPasteImport} title="구글 시트에서 복사한 데이터를 붙여넣어 한 번에 추가">📋 붙여넣기로 추가</button>
      <button className="btn btn-ghost" style={{fontSize:11}} onClick={copyAllCodes} disabled={!paCodes.length} title="현재 목록의 PA 코드를 줄바꿈으로 모두 복사">{copiedAll?'✅ 복사됨':`📋 PA코드 전체복사 (${paCodes.length})`}</button>
      {driveLink&&<a href={driveLink} target="_blank" rel="noopener" className="btn btn-ghost" style={{fontSize:11,textDecoration:'none'}}>📁 드라이브</a>}
    </div>
    <div className="table-wrap">
      <table>
        <thead><tr>
          <th className="del-col"></th>
          <th style={{width:85}}>날짜</th>
          <th style={{minWidth:120}}>채널명</th>
          <th style={{width:90}}>본명</th>
          <th style={{width:75}}>담당 PA</th>
          <th style={{minWidth:120,whiteSpace:'nowrap'}}>PA 코드</th>
          <th style={{minWidth:130}}>게시 링크</th>
          <th style={{width:96}}>라이브</th>
          <th style={{width:96}}>계약서</th>
          <th style={{width:120}}>정산</th>
          <th style={{width:80}}>개인정보</th>
        </tr>
        {showColF&&<tr className="colf-row">
          {[null,'date','channelName','realName','pa','paCode','postLink','live','contractDone',null,null].map((f,i)=>(
            <th key={i} style={{padding:'2px 4px'}}>{f&&<input className="colf-inp" value={colF[f]||''} onChange={e=>setCol(f,e.target.value)} placeholder="필터"/>}</th>
          ))}
        </tr>}
        </thead>
        <tbody>
          {shown.map(r=>{
            const isOpen=openId===r.id;
            const ss=settleState(r);const st=settleOf(r);
            return <React.Fragment key={r.id}>
              <tr style={{background:isOpen?'var(--surface2)':''}}>
                <td className="del-col"><button className="row-del-btn" onClick={()=>onDelete(r.id)}>×</button></td>
                <td><Cell value={r.date} onChange={v=>up(r.id,'date',v)} type="date" style={{width:80}}/></td>
                <td style={{fontWeight:500}}><Cell value={r.channelName} onChange={v=>up(r.id,'channelName',v)} placeholder="채널명"/></td>
                <td><Cell value={r.realName||''} onChange={v=>up(r.id,'realName',v)} placeholder={nameOf(r.channelName)||'본명'}/></td>
                <td><Cell value={r.pa||''} onChange={v=>up(r.id,'pa',v)} type="select" options={PA_LIST}/></td>
                <td><Cell value={r.paCode} onChange={v=>up(r.id,'paCode',v)} placeholder="코드" style={{whiteSpace:'nowrap'}}/></td>
                <td data-label="게시 링크">
                  {r.postLink
                    ?<span style={{display:'flex',alignItems:'center',gap:6}}>
                        <a href={r.postLink} target="_blank" rel="noopener" style={{color:'var(--blue)',fontSize:12}}>↗ 보기</a>
                        <span style={{cursor:'pointer',color:'var(--dim)',fontSize:10}} onClick={()=>up(r.id,'postLink','')}>×</span>
                      </span>
                    :<Cell value={r.postLink} onChange={v=>up(r.id,'postLink',v)} placeholder="https://..."/>}
                </td>
                <td data-label="라이브">
                  {/* 영상 라이브(업로드) 체크 — 켜면 그날 날짜 자동 기록 */}
                  {(()=>{const isLive=r.live==='Y';return (
                    <button onClick={()=>onUpdate(r.id,{live:isLive?'N':'Y',liveDate:(!isLive&&!r.liveDate)?today():r.liveDate})}
                      title={isLive?(r.liveDate?'라이브 '+r.liveDate:'라이브됨')+' — 클릭하면 해제':'클릭하면 라이브로 표시'}
                      style={{display:'inline-flex',flexDirection:'column',alignItems:'center',gap:1,padding:'2px 9px',borderRadius:5,cursor:'pointer',fontSize:11,fontWeight:700,border:'1px solid '+(isLive?'#22c55e':'var(--border)'),background:isLive?'#dcfce7':'var(--surface2)',color:isLive?'#15803d':'var(--dim)'}}>
                      <span>{isLive?'🔴 LIVE':'○ 미게시'}</span>
                      {isLive&&r.liveDate&&<span style={{fontSize:9,fontWeight:500,color:'var(--green)',opacity:.85}}>{r.liveDate}</span>}
                    </button>
                  );})()}
                </td>
                <td data-label="계약서">
                  {/* 계약서 작성여부 — 라이브 버튼처럼 토글. 켜면 작성일 자동 기록 */}
                  {(()=>{const done=r.contractDone==='Y';return (
                    <button onClick={()=>onUpdate(r.id,{contractDone:done?'N':'Y',contractDate:(!done&&!r.contractDate)?today():r.contractDate})}
                      title={done?(r.contractDate?'계약서 작성 '+r.contractDate:'작성됨')+' — 클릭하면 해제':'클릭하면 계약서 작성완료로 표시'}
                      style={{display:'inline-flex',flexDirection:'column',alignItems:'center',gap:1,padding:'2px 9px',borderRadius:5,cursor:'pointer',fontSize:11,fontWeight:700,border:'1px solid '+(done?'var(--accent)':'var(--border)'),background:done?'var(--accent-soft)':'var(--surface2)',color:done?'var(--accent)':'var(--dim)'}}>
                      <span>{done?'📄 작성완료':'○ 미작성'}</span>
                      {done&&r.contractDate&&<span style={{fontSize:9,fontWeight:500,color:'var(--accent)',opacity:.85}}>{r.contractDate}</span>}
                    </button>
                  );})()}
                </td>
                <td data-label="정산" style={{textAlign:'center'}}>
                  {/* 정산 상태 + 관리자 정산완료 버튼(따로). 개인정보 폐기 후엔 폐기완료로 표시. */}
                  {ss==='purged'
                    ? <span title={`정산 완료 후 개인정보 폐기됨 (${st.privacyPurgedDate||''})`} style={{fontSize:10,color:'var(--dim)',fontWeight:700,whiteSpace:'nowrap'}}>🗑️ 폐기완료</span>
                    : ss==='paid'
                      ? <span style={{display:'inline-flex',flexDirection:'column',gap:2,alignItems:'center'}}>
                          <span style={{fontSize:10,color:'var(--green)',fontWeight:700,whiteSpace:'nowrap'}}>✅ 정산완료{st.infSettledDate?` ${st.infSettledDate}`:''}</span>
                          {isManager&&<button onClick={()=>onSettle&&onSettle(r.channelName,false)} style={{fontSize:9,padding:'1px 6px',border:'1px solid var(--border)',borderRadius:4,background:'transparent',color:'var(--dim)',cursor:'pointer',whiteSpace:'nowrap'}}>정산 취소</button>}
                        </span>
                      : <span style={{display:'inline-flex',flexDirection:'column',gap:2,alignItems:'center'}}>
                          <span style={{fontSize:10,color:'#f59e0b',fontWeight:600,whiteSpace:'nowrap'}}>⏳ 미정산</span>
                          {isManager&&<button onClick={()=>onSettle&&onSettle(r.channelName,true,{pa:r.pa,realName:r.realName})} title="단가 지급 완료 표시 (3일 후 개인정보 자동 폐기)" style={{fontSize:9,padding:'2px 7px',border:0,borderRadius:4,background:'var(--green)',color:'#fff',fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>💰 정산완료</button>}
                        </span>}
                </td>
                <td data-label="개인정보" style={{textAlign:'center'}}>
                  {!isManager
                    ? <span style={{fontSize:10,color:'var(--dim)'}}>—</span>
                    : ss==='purged'
                      ? <span title="개인정보 폐기됨 — 볼 수 없음" style={{fontSize:10,color:'var(--dim)'}}>🗑️ 폐기됨</span>
                      : <button onClick={()=>setPvRow(r)} title="이 사람 개인정보 보기/입력 (관리자 전용)" style={{fontSize:10,padding:'3px 8px',border:'1px solid var(--border)',borderRadius:5,background:'var(--surface2)',color:'var(--text)',cursor:'pointer',whiteSpace:'nowrap'}}>🔒 개인정보</button>}
                </td>
              </tr>
            </React.Fragment>;
          })}
          <tr><td colSpan={11} style={{padding:'8px 0'}}>
            <button className="btn-add" onClick={onAdd}>+ 영상 검수 추가</button>
          </td></tr>
        </tbody>
      </table>
    </div>
    </div>
    <CalSidebar rows={rows} dayFilter={dayFilter} setDayFilter={setDayFilter} monthFilter={monthFilter} setMonthFilter={setMonthFilter}/>
    {pvRow&&<ReviewPrivacyModal row={pvRow} privacyRows={privacyRows} onUpdatePrivacy={onUpdatePrivacy} onAddPrivacy={onAddPrivacy} onClose={()=>setPvRow(null)}/>}
  </div>;
}

/* ─── PRIVACY VIEW ─── */
function FileCell({file,onUpdate,onDelete}){
  const src=useFileSrc(file);
  if(!file) return <span style={{color:'var(--dim)',fontSize:11}}>미첨부</span>;
  const isImg=file.type?.startsWith('image/');
  // 클릭 즉시 다운로드 — 외부(cross-origin) 주소는 download 속성이 무시돼 '새 탭 열림'이 되므로,
  // 파일을 먼저 blob으로 받아 objectURL로 강제 저장한다. blob을 못 받으면(예: CORS) 직접 링크로 폴백.
  const saveBlob=(blob)=>{
    const obj=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=obj; a.download=file.name||(isImg?'image':'file');
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(obj),1000);
  };
  const dl=async e=>{
    e.preventDefault();
    if(!src) return;
    try{
      const r=await fetch(src);
      if(!r.ok) throw new Error('fetch '+r.status);
      saveBlob(await r.blob());
    }catch{
      // 폴백: 그래도 안 되면 직접 다운로드 시도(같은 출처면 저장됨)
      const a=document.createElement('a');
      a.href=src; a.download=file.name||(isImg?'image':'file');
      document.body.appendChild(a); a.click(); a.remove();
    }
  };
  return <span style={{display:'flex',alignItems:'center',gap:6,justifyContent:'center'}}>
    {isImg
      ?<a href={src||undefined} download={file.name||'image'} onClick={dl} title="클릭하여 다운로드" style={{display:'inline-block',cursor:'pointer'}}>
          <img src={src} alt={file.name} style={{height:36,width:54,objectFit:'cover',borderRadius:4,border:'1px solid var(--border)',cursor:'pointer',background:'var(--surface2)'}}/>
        </a>
      :<a href={src||undefined} download={file.name||'file'} onClick={dl} title="클릭하여 다운로드" style={{fontSize:11,color:'var(--blue)',cursor:'pointer'}}>📄 {file.name}</a>}
    <button onClick={onDelete} style={{background:'none',border:'none',color:'var(--dim)',cursor:'pointer',fontSize:12,lineHeight:1}}>×</button>
  </span>;
}

// 노션 '정산 내역'에 입금요청 자동기입 — 로컬 브리지(Playwright+CDP) 호출.
// 브리지는 로컬 PC에서 node bridge.mjs 로 실행(노션 로그인된 크롬 필요). https→localhost는 브라우저가 허용.
const NOTION_BRIDGE = localStorage.getItem('notion_bridge') || 'http://localhost:8790';
function NotionBtn({ realName, amount }) {
  const [st, setSt] = useState('idle');
  const clean = amount == null ? '' : String(amount).replace(/[^\d]/g, '');
  const disabled = !realName || !clean;
  async function go() {
    if (disabled) { setSt('need'); setTimeout(() => setSt('idle'), 2500); return; }
    setSt('sending');
    try {
      const r = await fetch(NOTION_BRIDGE + '/settle', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ realName, amount: clean }) });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.ok) setSt('done');
      else setSt('err:' + (j.error || ('HTTP ' + r.status)));
    } catch (e) { setSt('offline'); }
  }
  const isErr = typeof st === 'string' && st.startsWith('err');
  const label = st === 'sending' ? '기입 중…(30초)' : st === 'done' ? '✅ 노션 기입됨' : st === 'offline' ? '⚠️ 브리지 꺼짐' : st === 'need' ? '실명·금액 필요' : isErr ? '❌ 실패(다시)' : '📝 노션 기입';
  return <button className="btn btn-ghost" title={isErr ? st.slice(4) : (st === 'offline' ? '로컬에서 bridge.mjs 실행 + 노션 로그인 크롬 필요' : `노션 정산내역에 기입: ${realName||'?'} / ${clean||'?'}원`)} style={{ fontSize: 9, padding: '2px 8px', whiteSpace: 'nowrap' }} disabled={st === 'sending'} onClick={go}>{label}</button>;
}
function PrivacyView({ rows, step2Rows, reviewRows, onUpdate, onDelete, onSettle, onAdd }) {
  const [pFilter,setPFilter]=useState('all');
  const [bulkMsg,setBulkMsg]=useState(''); const [bulkBusy,setBulkBusy]=useState(false);
  const s2=step2Rows||[];
  const rv=reviewRows||[];
  // 채널명으로 컨택현황(step2) 행을 찾아 정산/폐기 상태 판정 — 개인정보 페이지에서 바로 정산 처리·확인.
  const settleOf=name=>s2.find(r=>r.name===name)||{};
  const statusOf=r=>{const st=settleOf(r.channelName);return st.privacyPurged?'purged':st.infSettled==='Y'?'paid':'unpaid';};
  // '라이브 완료' 여부 — 컨택현황(step2)에서 라이브 누르면 우선 인정, 영상검수 라이브도 인정. 채널명으로 매칭.
  const liveOf=name=>s2.find(x=>x.name===name&&x.live==='Y')||rv.find(x=>x.channelName===name&&x.live==='Y');
  const isLive=r=>!!liveOf(r.channelName);
  const cnt={all:rows.length,live:rows.filter(r=>isLive(r)&&statusOf(r)==='unpaid').length,unpaid:rows.filter(r=>statusOf(r)==='unpaid').length,paid:rows.filter(r=>statusOf(r)==='paid').length,purged:rows.filter(r=>statusOf(r)==='purged').length};
  const shown=rows.filter(r=>pFilter==='all'?true:pFilter==='live'?(isLive(r)&&statusOf(r)==='unpaid'):statusOf(r)===pFilter);
  // ── 전체 일괄 자동인식 — 폐기 안 된 행 중, 파일은 있는데 은행/계좌·주민번호가 빈 것을 순회 OCR ──
  async function autoAll(){
    const targets=rows.filter(r=>statusOf(r)!=='purged' && ((r.bankFile&&!(r.bankName&&r.bankAccount)) || (r.idFile&&!r.rrn)));
    if(!targets.length){ setBulkMsg('자동인식할 대상이 없어요 — 파일 있는 행은 모두 인식됨.'); return; }
    setBulkBusy(true); let filled=0;
    for(let i=0;i<targets.length;i++){ const r=targets[i];
      setBulkMsg(`자동 인식 중… ${i+1}/${targets.length} — ${r.channelName||r.realName||''} (처음엔 한글데이터 받느라 느려요)`);
      const patch={};
      if(r.bankFile&&!(r.bankName&&r.bankAccount)){ const src=await resolveFileSrc(r.bankFile); if(src){ const pb=parseBank(await ocrImage(src)); if(src.startsWith('blob:'))URL.revokeObjectURL(src); if(pb.bank&&!r.bankName)patch.bankName=pb.bank; if(pb.holder&&!r.bankHolder)patch.bankHolder=pb.holder; if(pb.account&&!r.bankAccount)patch.bankAccount=pb.account; } }
      if(r.idFile&&!r.rrn){ const src=await resolveFileSrc(r.idFile); if(src){ const rrn=parseRRN(await ocrImage(src)); if(src.startsWith('blob:'))URL.revokeObjectURL(src); if(rrn)patch.rrn=rrn; } }
      if(Object.keys(patch).length){ onUpdate(r.id,patch); filled++; }
    }
    setBulkBusy(false); setBulkMsg(`✅ 완료 — 대상 ${targets.length}명 중 ${filled}명 자동 채움. 빈 칸은 각 행 🔒에서 확인·수정하세요.`);
  }
  return <div className="privacy-page">
    <div className="privacy-warn">🔒 관리자 전용 페이지입니다. 개인정보가 포함되어 있으니 외부 노출에 주의하세요. · 인플루언서에게 단가를 지급한 뒤 <b>💰 정산 처리</b>를 누르면 <b>3일 후 개인정보가 자동 폐기</b>됩니다.</div>
    <div className="toolbar" style={{padding:'8px 16px'}}>
      {[{k:'all',l:`전체 (${cnt.all})`,c:''},{k:'live',l:`🔴 라이브·정산전 (${cnt.live})`,c:'f-deal'},{k:'unpaid',l:`정산 전 (${cnt.unpaid})`,c:'f-rj'},{k:'paid',l:`✅ 정산완료 (${cnt.paid})`,c:'f-deal'},{k:'purged',l:`🗑️ 폐기완료 (${cnt.purged})`,c:'f-wt'}]
        .map(({k,l,c})=><button key={k} className={`fchip ${c} ${pFilter===k?'active':''}`} onClick={()=>setPFilter(k)}>{l}</button>)}
      <button className="btn btn-primary" style={{marginLeft:8,fontSize:12,padding:'4px 12px'}} disabled={bulkBusy} onClick={autoAll}>{bulkBusy?'인식 중…':'🔍 전체 자동인식'}</button>
      <span className="cnt">{shown.length}명</span>
    </div>
    {bulkMsg&&<div style={{fontSize:12,color:'var(--accent)',padding:'0 16px 8px'}}>{bulkMsg}</div>}
    <div className="table-wrap" style={{flex:'1 1 0'}}>
      <table>
        <thead><tr>
          <th className="del-col"></th>
          <th style={{width:120}}>채널명</th>
          <th style={{width:90}}>성명</th>
          <th style={{width:130}}>전화번호</th>
          <th style={{width:220}}>주소</th>
          <th style={{width:100,textAlign:'center'}}>통장사본</th>
          <th style={{width:100,textAlign:'center'}}>신분증사본</th>
          <th style={{minWidth:120}}>비고</th>
          <th style={{width:140,textAlign:'center'}}>정산 / 지급 처리</th>
        </tr></thead>
        <tbody>
          {shown.map(r=>{
            const st=settleOf(r.channelName);
            const status=statusOf(r);
            const left=status==='paid'?(()=>{const dd=daysSinceKey(st.infSettledDate);return dd==null?null:3-dd;})():null;
            return (
            <tr key={r.id}>
              <td className="del-col"><button className="row-del-btn" onClick={()=>onDelete(r.id)}>×</button></td>
              <td style={{fontWeight:500}}>
                <Cell value={r.channelName} onChange={v=>onUpdate(r.id,{channelName:v})} placeholder="채널명"/>
              </td>
              <td><Cell value={r.realName} onChange={v=>onUpdate(r.id,{realName:v})} placeholder="성명"/></td>
              <td><Cell value={r.phone} onChange={v=>onUpdate(r.id,{phone:v})} placeholder="010-0000-0000"/></td>
              <td><Cell value={r.address} onChange={v=>onUpdate(r.id,{address:v})} placeholder="주소"/></td>
              <td style={{textAlign:'center'}}>
                {r.bankFile
                  ?<FileCell file={r.bankFile} onDelete={()=>onUpdate(r.id,{bankFile:null})}/>
                  :<FileUpload label="첨부" value={null} onChange={v=>onUpdate(r.id,{bankFile:v})}/>}
              </td>
              <td style={{textAlign:'center'}}>
                {r.idFile
                  ?<FileCell file={r.idFile} onDelete={()=>onUpdate(r.id,{idFile:null})}/>
                  :<FileUpload label="첨부" value={null} onChange={v=>onUpdate(r.id,{idFile:v})}/>}
              </td>
              <td><Cell value={r.notes} onChange={v=>onUpdate(r.id,{notes:v})} placeholder="비고"/></td>
              <td style={{textAlign:'center'}}>
                {status==='purged'
                  ? <span title={`정산 완료 후 3일 경과 — 개인정보 폐기됨 (${st.privacyPurgedDate||''})`} style={{fontSize:10,color:'var(--dim)',whiteSpace:'nowrap'}}>🗑️ 폐기완료</span>
                  : status==='paid'
                    ? <div style={{display:'inline-flex',flexDirection:'column',gap:3,alignItems:'center'}}>
                        <span style={{fontSize:10,color:'var(--green)',fontWeight:700,whiteSpace:'nowrap'}}>✅ 정산완료{st.infSettledDate?` ${st.infSettledDate}`:''}</span>
                        {left!=null&&(left>0
                          ? <span style={{fontSize:9,color:'#f59e0b',whiteSpace:'nowrap'}}>🔒 개인정보 폐기 D-{left}</span>
                          : <span style={{fontSize:9,color:'var(--red)',whiteSpace:'nowrap'}}>🔒 폐기 예정(새로고침 시)</span>)}
                        <button className="btn btn-ghost" style={{fontSize:9,padding:'1px 7px'}} onClick={()=>onSettle(r.channelName,false)}>정산 취소</button>
                      </div>
                    : <div style={{display:'inline-flex',flexDirection:'column',gap:2,alignItems:'center'}}>
                        <span style={{fontSize:9,color:'var(--dim)'}}>정산 전</span>
                        <button className="btn btn-green" style={{fontSize:10,padding:'3px 10px',whiteSpace:'nowrap'}} onClick={()=>onSettle(r.channelName,true)}>💰 정산 처리</button>
                      </div>}
                {status!=='purged' && <div style={{marginTop:5}}><NotionBtn realName={r.realName} amount={st.rate}/></div>}
              </td>
            </tr>);
          })}
          <tr><td colSpan={9} style={{padding:'8px 0'}}>
            <button className="btn-add" onClick={onAdd}>+ 개인정보 추가</button>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>;
}

          <th style={{padding:'9px 14px',textAlign:'center',fontSize:11,fontWeight:600,color:'#a1a1aa',borderBottom:'1px solid var(--border)',width:100}}>처리</th>
          <th style={{padding:'9px 14px',textAlign:'center',fontSize:11,fontWeight:600,color:'#a1a1aa',borderBottom:'1px solid var(--border)',width:36}}>내역</th>
        </tr>
      </thead>
      <tbody>
        {Object.entries(byPA).map(([pa,data],idx,arr)=>{
          const cur=bs[pa]||{};

          const outstanding=data.total-(cur.paid||0);
          const isLast=idx===arr.length-1;
          const isExp=expanded[pa];
          // 협업 성사(수락)분은 위로, DM만(거절·미성사)분은 아래로 정렬해 한눈에 구분
          const detailRows=data.rows.filter(r=>r.subtotal>0).sort((a,b)=>(b.deal>0)-(a.deal>0));

                </div>
              </td>
              <td style={{padding:'11px 14px',textAlign:'right',fontSize:12,color:'var(--blue)',fontWeight:600}}>
                {fmtMoney(data.dmTotal)}

                {paid
                  ?<span style={{fontSize:11,color:'var(--green)',fontWeight:600}}>✅ 완료{cur.paidDate&&<span style={{fontSize:10,color:'var(--dim)',marginLeft:4}}>{cur.paidDate}</span>}</span>

                      <th style={{fontSize:10,color:'#3b82f6',fontWeight:600,textAlign:'right',padding:'3px 8px',borderBottom:'1px solid var(--border)'}}>DM</th>
                      <th style={{fontSize:10,color:'#a855f7',fontWeight:600,textAlign:'right',padding:'3px 8px',borderBottom:'1px solid var(--border)'}}>성사</th>
                      <th style={{fontSize:10,color:'#eab308',fontWeight:600,textAlign:'right',padding:'3px 8px',borderBottom:'1px solid var(--border)'}}>소계</th>
                    </tr>
                  </thead>
                  <tbody>
                    {detailRows.map(r=><tr key={r.id} style={{background:r.deal>0?'#faf5ff':'transparent'}}>
                      <td style={{padding:'4px 8px',borderBottom:'1px solid var(--border)'}}>
                        {r.deal>0
                          ?<span style={{fontSize:9,color:'#7c3aed',background:'#f3e8ff',borderRadius:4,padding:'1px 6px',fontWeight:700,whiteSpace:'nowrap'}}>🤝 협업</span>
                          :<span style={{fontSize:9,color:'#1d4ed8',background:'#dbeafe',borderRadius:4,padding:'1px 6px',fontWeight:700,whiteSpace:'nowrap'}}>💬 DM만</span>}
                      </td>
                      <td style={{fontSize:11,padding:'4px 8px',color:'var(--text)',borderBottom:'1px solid var(--border)'}}>{r.name}</td>
                      <td style={{fontSize:11,padding:'4px 8px',textAlign:'right',color:r.dm>0?'var(--blue)':'var(--dim)',borderBottom:'1px solid var(--border)'}}>{r.dm>0?fmtMoney(r.dm):'—'}</td>
                      <td style={{fontSize:11,padding:'4px 8px',textAlign:'right',color:r.deal>0?'var(--purple)':'var(--dim)',borderBottom:'1px solid var(--border)'}}>{r.deal>0?fmtMoney(r.deal):'—'}</td>
                      <td style={{fontSize:11,padding:'4px 8px',textAlign:'right',color:'var(--yellow)',fontWeight:600,borderBottom:'1px solid var(--border)'}}>{fmtMoney(r.subtotal)}</td>
                    </tr>)}
                  </tbody>
                </table>
              </td>
            </tr>}
          </React.Fragment>;
        })}
        {/* 합계 행 */}
        <tr style={{background:'var(--surface3)',borderTop:'2px solid var(--border)'}}>
          <td style={{padding:'10px 14px',fontSize:12,fontWeight:700,color:'var(--text)'}}>합계</td>
          <td style={{padding:'10px 14px',textAlign:'right',fontSize:12,color:'var(--blue)',fontWeight:700}}>
            {fmtMoney(Object.values(byPA).reduce((s,d)=>s+d.dmTotal,0))}
          </td>
          <td style={{padding:'10px 14px',textAlign:'right',fontSize:12,color:'var(--purple)',fontWeight:700}}>
            {fmtMoney(Object.values(byPA).reduce((s,d)=>s+d.dealTotal,0))}
          </td>
          <td style={{padding:'10px 14px',textAlign:'right'}}>
            <div style={{fontSize:14,color:'var(--yellow)',fontWeight:800}}>{fmtMoney(Object.values(byPA).reduce((s,d)=>s+d.total,0))}</div>
            <div style={{fontSize:11,color:'#15803d',fontWeight:700,marginTop:2}}>실지급 {fmtMoney(afterTax(Object.values(byPA).reduce((s,d)=>s+d.total,0)))}</div>
          </td>
          <td colSpan={3}/>
        </tr>
      </tbody>
    </table>
  </div>;
}

/* ─── SETTLE VIEW ─── */
function SettleView({ brand, settlements, setSettlements, staffPA }) {
  // staffPA: null=관리자(전체) / 문자열=해당 담당자 본인 것만(읽기전용). ''=계정에 담당자 미설정
  const isStaffView = staffPA!=null;
  // 정산 대상 = 컨택현황(step2)만. Claude 발굴 탭(claudeStep2)은 정산에서 제외.
  const allRows2=brand?.step2Rows||[];
  // 정산에서 제외할 담당자(관리자 등 — 수당 정산 대상 아님)
  const SETTLE_EXCLUDE_PA=['이은영'];
  // 스태프는 본인 담당분만. 공통으로 제외 담당자(이은영)는 집계에서 뺌.
  const allS2 = (isStaffView ? allRows2.filter(r=>sanitizePA(r.pa)===staffPA) : allRows2)
    .filter(r=>!SETTLE_EXCLUDE_PA.includes(sanitizePA(r.pa)));
  const settle=getSettleInfo();
  const isUrgent=settle.days<=3;

  // 정산 대상 월 선택 — 기본값은 '이번에 지급하는 달'(익월 첫째 주 목요일 지급 기준의 전월)
  const monthOpts=useMemo(()=>{
    const s=new Set([settle.coverYM]);
    allS2.forEach(r=>{
      if(r.dmSent==='Y'){const y=parseYM(r.dmDate)||parseYM(r.date);if(y)s.add(y);}
      if(r.dealDone==='Y'){const y=parseYM(r.dealDate)||parseYM(r.date);if(y)s.add(y);}
    });
    return Array.from(s).sort().reverse();
  },[allS2,settle.coverYM]);
  const [month,setMonth]=useState(settle.coverYM);
  const inMonth=(ym)=>month==='all'||ym===month;

  const byPA=useMemo(()=>{
    const m={};
    allS2.filter(r=>r.name).forEach(r=>{
      // ★ DM은 '발송한 달'(dmDate), 성사는 '업로드(성사)한 달'(dealDate)에 각각 따로 귀속.
      //    한 사람이 6월 DM·7월 성사면 → 6월 DM 2천, 7월 성사 2만으로 분리 집계.
      const dmYM=parseYM(r.dmDate)||parseYM(r.date);
      const dealYM=parseYM(r.dealDate)||parseYM(r.date);
      const dm  =(r.dmSent==='Y'  &&(month==='all'||dmYM===month))  ?2000 :0;
      const deal=(r.dealDone==='Y'&&(month==='all'||dealYM===month))?20000:0;
      const subtotal=dm+deal;
      if(subtotal===0) return;
      const pa=sanitizePA(r.pa)||'미지정';
      if(!m[pa])m[pa]={rows:[],dmTotal:0,dealTotal:0,total:0};
      m[pa].rows.push({...r,dm,deal,subtotal});
      m[pa].dmTotal+=dm; m[pa].dealTotal+=deal; m[pa].total+=subtotal;
    });
    return m;
  },[allS2,month]);

  // 결과 미정으로 정산 보류된 인원(진행중 등인데 DM은 보낸 사람) — 빠진 게 아님을 안내
  const heldPeople=allS2.filter(r=>r.name && ((r.dmSent==='Y'&&!(parseYM(r.dmDate)||parseYM(r.date)))||(r.dealDone==='Y'&&!(parseYM(r.dealDate)||parseYM(r.date))))).length;

  // 정산 완료 기록은 월별로 분리 저장: settlements[brandId][month][pa]
  const brandS=settlements[brand?.id]||{};
  // 특정 월이면 그 달 지급기록. 전체 누적이면 모든 달의 지급액을 PA별로 합산.
  const bs=(month==='all')
    ? Object.values(brandS).reduce((acc,mo)=>{Object.entries(mo||{}).forEach(([pa,v])=>{acc[pa]={paid:(acc[pa]?.paid||0)+(v?.paid||0)};});return acc;},{})
    : (brandS[month]||{});
  const grandTotal=Object.values(byPA).reduce((s,p)=>s+p.total,0);
  // 월별: 전액 지급 시만 완료로 합산. 전체 누적: 실제 지급액 합(각 PA 총액 상한).
  const paidTotal=Object.entries(byPA).reduce((s,[pa,d])=>{
    const paid=bs[pa]?.paid||0;
    return s + (month==='all' ? Math.min(paid,d.total) : ((paid>=d.total&&d.total>0)?d.total:0));
  },0);

  function togglePaid(pa,data){
    if(isStaffView)return;   // 스태프는 조회 전용 — 정산 완료 처리 불가
    if(month==='all')return; // 누적 보기에서는 정산 처리 불가
    const cur=bs[pa]||{};
    const already=(cur.paid||0)>=data.total&&data.total>0;
    setSettlements(p=>{
      const n={...p};
      const bo={...(n[brand.id]||{})};
      const mo={...(bo[month]||{})};
      mo[pa]=already?{paid:0,paidDate:'',note:cur.note}:{paid:data.total,paidDate:new Date().toLocaleDateString('ko-KR'),note:cur.note||''};
      bo[month]=mo; n[brand.id]=bo;
      return n;
    });
  }

  const paidCount=Object.entries(byPA).filter(([pa,d])=>{const c=bs[pa]||{};return(c.paid||0)>=d.total&&d.total>0;}).length;
  const totalPA=Object.keys(byPA).length;
  const pct=grandTotal>0?Math.round(paidTotal/grandTotal*100):0;

  // 누락 방지 체크리스트 — 정산 가능한(거절·성사) 수당이 잡힌 월 중 아직 다 지급 못한 월
  const pendingMonths=useMemo(()=>{
    const owed={};
    allS2.filter(r=>r.name).forEach(r=>{
      if(r.dmSent==='Y'){const k=parseYM(r.dmDate)||parseYM(r.date);if(k)owed[k]=(owed[k]||0)+2000;}
      if(r.dealDone==='Y'){const k=parseYM(r.dealDate)||parseYM(r.date);if(k)owed[k]=(owed[k]||0)+20000;}
    });
    const brandS=settlements[brand?.id]||{};
    return Object.keys(owed).map(ym=>{
      const paid=isStaffView
        ? ((brandS[ym]||{})[staffPA]?.paid||0)            // 본인 지급액만
        : Object.values(brandS[ym]||{}).reduce((s,v)=>s+(v?.paid||0),0);
      return {ym,owed:owed[ym],out:owed[ym]-paid};
    }).filter(x=>x.out>0).sort((a,b)=>a.ym<b.ym?1:-1);
  },[allS2,settlements,brand,isStaffView,staffPA]);

  // 스태프인데 계정에 담당자(PA)가 지정되지 않은 경우 — 본인 식별 불가
  if(isStaffView && !staffPA){
    return <div style={{display:'flex',flex:'1 1 0',overflow:'hidden'}}>
      <div className="settle-page">
        <div className="empty" style={{marginTop:40}}>
          <div className="empty-icon">🔒</div>
          <div className="empty-text">이 계정에 담당자(PA) 이름이 설정되어 있지 않습니다.<br/>관리자에게 본인 계정의 담당자 지정을 요청해 주세요.</div>
        </div>
      </div>
    </div>;
  }

  return <div style={{display:'flex',flex:'1 1 0',overflow:'hidden'}}>
    <div className="settle-page">

    {isStaffView && <div style={{background:'var(--accent-soft)',border:'1px solid var(--accent)',borderRadius:10,padding:'10px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontSize:18}}>💰</span>
      <div>
        <div style={{fontWeight:700,fontSize:13,color:'var(--ah)'}}>내 정산 내역 — {staffPA}</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>본인 담당분만 조회됩니다 (읽기 전용). 지급 처리는 관리자가 합니다.</div>
      </div>
    </div>}

    {/* 상단: 정산일 + 진행 요약 */}
    <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:12,marginBottom:16,alignItems:'stretch'}}>
      {/* 정산일 카드 */}
      <div style={{background:isUrgent?'#fef2f2':'var(--accent-soft)',border:`1px solid ${isUrgent?'#ef4444':'var(--accent)'}`,borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',gap:14}}>
        <span style={{fontSize:28}}>{isUrgent?'🚨':settle.days===0?'🔔':'📅'}</span>
        <div>
          <div style={{fontWeight:800,fontSize:15,color:isUrgent?'#b91c1c':'var(--ah)',marginBottom:2}}>
            {settle.days===0?'오늘이 정산일입니다!'
             :settle.days<0?'정산일이 지났습니다!'
             :isUrgent?`정산일 D-${settle.days}`
             :`다음 정산까지 ${settle.days}일`}
          </div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{settle.label} 지급 · <b style={{color:'var(--ah)'}}>{settle.coverLabel}</b> 실적분</div>
        </div>
      </div>
      {/* 진행률 */}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 20px',minWidth:160,display:'flex',flexDirection:'column',justifyContent:'center',gap:6}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)'}}>
          <span>정산 진행률</span><span style={{fontWeight:700,color:pct===100?'var(--green)':'var(--yellow)'}}>{pct}%</span>
        </div>
        <div style={{height:6,background:'var(--surface3)',borderRadius:3,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:pct===100?'var(--green)':'var(--accent)',borderRadius:3,transition:'width .4s'}}/>
        </div>
        <div style={{fontSize:11,color:'var(--dim)',textAlign:'center'}}>{paidCount}/{totalPA}명 완료</div>
      </div>
    </div>

    {/* 정산 대상 월 선택 */}
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
      <span style={{fontSize:12,color:'var(--muted)'}}>📆 정산 대상 월</span>
      <select value={month} onChange={e=>setMonth(e.target.value)}
        style={{background:'var(--surface2)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 12px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
        {monthOpts.map(ym=><option key={ym} value={ym}>{ymLabel(ym)}{ym===settle.coverYM?' (이번 지급분)':''}</option>)}
        <option value="all">전체 누적</option>
      </select>
      <span style={{fontSize:11,color:'var(--dim)'}}>
        {month==='all'?'전체 기간 누적 — 정산 처리는 특정 월을 선택하세요':`${ymLabel(month)} 1일~말일 실적 · 익월 첫째 주 목요일 지급`}
      </span>
    </div>

    {/* 정산 규칙 — 한 줄 요약 */}
    <div style={{marginBottom:14,fontSize:11.5,color:'var(--muted)'}}>
      DM 발송 = 2,000원 · 협업 성사(영상 업로드+광고코드) = +20,000원 · 체크된 DM·성사는 모두 정산 반영{heldPeople>0&&<span style={{color:'var(--orange)'}}> · ⏸ 날짜없어 보류 {heldPeople}명</span>}
    </div>

    {/* 미지급 월 빠른 이동 — 있을 때만 표시 */}
    {pendingMonths.length>0&&
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:16}}>
        <span style={{fontSize:11,color:'#b45309',fontWeight:600}}>🔔 미지급 월</span>
        {pendingMonths.map(p=>(
          <button key={p.ym} onClick={()=>setMonth(p.ym)}
            style={{background:p.ym===month?'#a16207':'var(--surface2)',color:p.ym===month?'#fff':'var(--text)',border:'1px solid '+(p.ym===month?'#a16207':'var(--border)'),borderRadius:8,padding:'4px 10px',fontSize:11,cursor:'pointer'}}>
            {ymLabel(p.ym)} · {p.out.toLocaleString()}원
          </button>
        ))}
      </div>}

    {/* 3개 요약 수치 */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
      {[
        {label:'총 지급 예정',val:grandTotal,color:'var(--yellow)',icon:'💰',net:true},
        {label:'정산 완료(기지급)',val:paidTotal,color:'var(--green)',icon:'✅',net:true},
        {label:'미정산',val:grandTotal-paidTotal,color:(grandTotal-paidTotal)>0?'var(--red)':'var(--muted)',icon:'⏳',net:true},
      ].map(({label,val,color,icon,net})=>(
        <div key={label} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:6,display:'flex',alignItems:'center',gap:4}}>
            <span>{icon}</span>{label}
          </div>
          <div style={{fontSize:20,fontWeight:800,color,letterSpacing:'-0.03em'}}>
            {val.toLocaleString()}<span style={{fontSize:12,fontWeight:400}}>원</span>
          </div>
          {net&&val>0&&<div style={{fontSize:11,color:'#15803d',fontWeight:600,marginTop:4}}>3.3% 공제 후 실지급 {afterTax(val).toLocaleString()}원</div>}
        </div>
      ))}
    </div>

    {Object.keys(byPA).length===0&&<div className="empty"><div className="empty-icon">💰</div><div className="empty-text">{month==='all'?'STEP2 컨택현황에 데이터를 입력하면 자동으로 집계됩니다':`${ymLabel(month)}에 발생한 DM·성사 수당이 없습니다`}</div></div>}

    {/* PA별 정산 테이블 */}
    {Object.keys(byPA).length>0&&<SettleTable byPA={byPA} bs={bs} togglePaid={togglePaid} readOnly={isStaffView}/>}
  </div>
</div>;
}

/* ─── GUIDE VIEW ─── */
function GuideView({ brand }) {
  const bId=brand?.id;
  return <div className="guide-page">
    <div className="guide-section">
      <div className="guide-h1">📖 PA Manager (ey) 사용 가이드</div>
      <div className="guide-sub">인플루언서 협업 전체 흐름을 한 곳에서 관리합니다.<br/>리스트업 → 컨택 → 계약서 작성 → 제품 발송 → 영상 검수 → 업로드</div>
    </div>

    {/* 전체 흐름 */}
    <div className="guide-section">
      <div className="guide-h2">🗺️ 전체 업무 흐름</div>
      <div className="guide-card" style={{padding:'12px 16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',fontSize:12}}>
          {['① STEP1 리스트업','② STEP2 컨택','③ 계약서 작성','④ 제품 발송','⑤ 영상 검수','⑥ 업로드 확인'].map((s,i,a)=>(
            <React.Fragment key={s}>
              <span style={{background:'var(--surface3)',borderRadius:6,padding:'4px 10px',whiteSpace:'nowrap'}}>{s}</span>
              {i<a.length-1&&<span style={{color:'var(--dim)'}}>→</span>}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>


    <div className="guide-section">
      <div className="guide-h2">📋 STEP1 리스트업 — 인플루언서 발굴 및 등록</div>
      <div className="guide-card">
        <div className="guide-card-title">🔍 인플루언서 추가하기</div>
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text">화면 하단의 <strong>+ 인플루언서 추가</strong> 버튼을 클릭합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text"><strong>채널명</strong>과 <strong>채널 링크</strong>를 입력합니다. (인스타그램 계정명 또는 URL)</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text"><strong>팔로워 수, 페르소나/카테고리</strong>를 입력합니다. (예: 낚시/아웃도어, 40대 남성)</div></div>
          <div className="guide-step"><div className="guide-step-num">4</div><div className="guide-step-text"><strong>담당 PA</strong>에 본인 이름을 선택합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">5</div><div className="guide-step-text">검수 상태는 <strong>검수대기</strong>로 두고 담당자에게 검수를 요청합니다.</div></div>
        </div>
        <div className="guide-tip">💡 셀을 클릭하면 바로 수정할 수 있습니다. Enter 키로 저장, Esc 키로 취소합니다.</div>
      </div>
      <div className="guide-card">
        <div className="guide-card-title">✅ 검수 흐름 (담당자 전용)</div>
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text">검수 상태 셀을 클릭 → <strong>승인</strong> 또는 <strong>반려</strong>를 선택합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text"><strong>승인</strong> 선택 시 해당 인플루언서가 자동으로 <strong>STEP2 컨택현황</strong>에 추가됩니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text"><strong>반려</strong> 선택 시 반려 사유를 입력합니다.</div></div>
        </div>
        <div className="guide-warn">⚠️ 한 번 승인된 항목은 자동으로 STEP2에 추가됩니다. 중복 추가되지 않습니다.</div>
      </div>
    </div>

    <div className="guide-section">
      <div className="guide-h2">📨 STEP2 컨택현황 — 컨택 진행 상황 관리</div>
      <div className="guide-card">
        <div className="guide-card-title">📞 컨택 진행 업데이트</div>
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text">STEP1에서 승인된 인플루언서가 자동으로 여기에 나타납니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text"><strong>진행 상태</strong>를 클릭하여 현황을 업데이트합니다. (컨택 전 → 진행중 → 컨택 완료 → 계약서 작성, 또는 거절)</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text">DM을 발송했으면 <strong>DM발송</strong> 버튼을 클릭하여 Y로 변경합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">4</div><div className="guide-step-text">협업이 성사되면 <strong>협업성사</strong> 버튼을 Y로 변경합니다. → <strong>성사일</strong>이 오늘 날짜로 자동 기록됩니다. (날짜가 다르면 성사일 셀을 클릭해 직접 수정)</div></div>
          <div className="guide-step"><div className="guide-step-num">5</div><div className="guide-step-text">예상 게시일, 출고/계약서 완료 여부를 업데이트합니다.</div></div>
        </div>
      </div>
      <div className="guide-card" style={{marginTop:8}}>
        <div className="guide-card-title">💰 단가 확인 &amp; 인플루언서 정산</div>
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text"><strong>단가</strong> 컬럼이 컨택현황에 표시됩니다. (프리랜서도 협의된 단가를 확인할 수 있습니다)</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text">컨택현황의 <strong>인플루언서 정산</strong> 칸은 <strong>읽기전용 상태 표시</strong>입니다. (정산 전 / ✅ 정산완료 / 🗑️ 폐기완료) 실제 정산 처리는 <strong>개인정보</strong> 페이지에서 합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text"><strong>개인정보</strong> 페이지에서 통장사본을 확인해 단가를 지급한 뒤, 그 줄의 <strong>💰 정산 처리</strong> 버튼을 누릅니다. (잘못 눌렀으면 <strong>정산 취소</strong>로 되돌림)</div></div>
          <div className="guide-step"><div className="guide-step-num">4</div><div className="guide-step-text">개인정보 페이지 상단 칩(<strong>정산 전 / ✅ 정산완료 / 🗑️ 폐기완료</strong>)으로 누가 정산됐는지 한눈에 확인할 수 있습니다.</div></div>
        </div>
        <div className="guide-warn">🔒 개인정보 보호: 정산 완료 <strong>3일 후</strong> 해당 인플루언서의 개인정보(성명·연락처·주소·통장/신분증 파일)가 <strong>자동 폐기</strong>됩니다. 채널명과 정산 기록은 회계용으로만 남습니다. (되돌릴 수 없음)</div>
      </div>
      <div className="guide-card" style={{marginTop:8}}>
        <div className="guide-card-title">📦 진행 중 / 보관 — 목록 정리</div>
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text">기본 화면은 <strong>진행 중</strong>만 보여줍니다. 거절했거나 개인정보가 폐기된 인플루언서는 자동으로 목록에서 빠집니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text">상단 <strong>📦 보관</strong> 칩을 누르면 거절·폐기된 인플루언서를 모아 볼 수 있습니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text">리스트업도 <strong>진행 중</strong>에서 반려된 인플루언서가 빠지고, <strong>📦 반려</strong> 칩에서 따로 봅니다.</div></div>
        </div>
        <div className="guide-tip">💡 데이터와 수당 정산은 <strong>그대로 보존</strong>됩니다(삭제 아님). 검색창은 보관 항목까지 포함해 누구든 찾을 수 있습니다.</div>
      </div>
    </div>

    <div className="guide-section">
      <div className="guide-h2">📦 출고 — 제품 출고 신청 및 관리</div>
      <div className="guide-card">
        <div className="guide-card-title">📬 출고 신청하기</div>
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text"><strong>+ 출고 추가</strong> 버튼을 클릭합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text">요청자(본인 이름), 상품명, 수령자명, 연락처, 배송지 주소를 입력합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text">담당자가 확인 후 처리 상태를 <strong>✅ 완료</strong>로 변경하고 송장번호를 입력합니다.</div></div>
        </div>
      </div>
    </div>

    <div className="guide-section">
      <div className="guide-h2">📝 계약서 작성</div>
      <div className="guide-card">
        <div className="guide-card-title">📋 계약서 작성 프로세스</div>
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text">PA 총괄(이은영)이 <strong>계약서 양식(.docx)</strong>을 PA 컨택 담당자에게 전달합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text">PA 컨택 담당자가 계약자 이름·단가를 기입 후 인플루언서에게 전달합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text">인플루언서가 개인정보(성함·주민번호·연락처·주소) 및 서명을 직접 기입합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">4</div><div className="guide-step-text">서명 완료된 파일을 수령 후 <strong>PDF로 변환</strong>하여 구글 드라이브 지정 폴더에 업로드합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">5</div><div className="guide-step-text">PA 총괄(이은영)이 업로드된 파일을 최종 확인 후 STEP2 계약서 상태를 <strong>✅ 완료</strong>로 변경합니다.</div></div>
        </div>
        <div className="guide-warn">⚠️ 계약서는 인플루언서가 먼저 요청하지 않는 이상, <strong>최종 영상 업로드 완료 후</strong>에 작성을 진행합니다. 영상 게시 전 계약서 진행 시 반드시 이은영 확인 필요.</div>
      </div>
      <div className="guide-card" style={{marginTop:8}}>
        <div className="guide-card-title">📌 계약서 필수 포함 항목</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:4}}>
          {[['법인명','협찬 제품에 맞는 법인명'],['계약자 이름','계약자 이름 확인'],['단가','협의된 단가'],['계약일자','계약일자'],['연락처','확인된 연락처'],['주민번호','본인 직접 기입'],['주소','확인된 주소'],['이름(서명)','확인된 성함']].map(([k,v])=>(
            <div key={k} style={{background:'var(--surface2)',borderRadius:6,padding:'6px 10px'}}>
              <div style={{fontSize:10,color:'var(--muted)',marginBottom:2}}>{k}</div>
              <div style={{fontSize:12}}>{v}</div>
            </div>
          ))}
        </div>
      </div>
    </div>

    <div className="guide-section">
      <div className="guide-h2">🎬 영상 수령 및 검수</div>
      <div className="guide-card">
        <div className="guide-card-title">검수 체크리스트</div>
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text">인플루언서에게 영상 파일 또는 게시 링크를 수령합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text">아래 <strong>검수 체크리스트를 참고해서 영상을 검수</strong>합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text">4개 항목(제작 방향성·화질·자막·과한 컨셉) 모두 체크 시 <strong>승인</strong>으로 변경합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">4</div><div className="guide-step-text">수정이 필요한 경우 <strong>반려</strong>로 변경 후 메모에 수정 요청 내용을 기입합니다.</div></div>
        </div>
        <div className="guide-tip">💡 제작 방향성 가이드는 브랜드별 노션 페이지에서 확인하세요. 위 빠른 링크 참고.</div>
      </div>
    </div>

    <div className="guide-section">
      <div className="guide-h2">📤 영상 업로드 확인</div>
      <div className="guide-card">
        <div className="guide-steps">
          <div className="guide-step"><div className="guide-step-num">1</div><div className="guide-step-text">인플루언서가 영상을 업로드하면 <strong>게시 링크</strong>를 영상검수 탭에 기입합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">2</div><div className="guide-step-text">게시된 영상이 검수 내용과 동일한지 최종 확인합니다.</div></div>
          <div className="guide-step"><div className="guide-step-num">3</div><div className="guide-step-text">확인 완료 후 STEP2의 <strong>출고완료·계약서</strong> 상태를 최종 업데이트합니다.</div></div>
        </div>
      </div>
    </div>

  </div>;
}
